<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fedelicious | Menu</title>
</head>

<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="brand">
                <div class="brand-icon">
                    <img src="images/fede.png" alt="Logo">
                </div>
                <span class="brand-name">Fedelicious</span>
            </div>

            <ul class="nav-links">
                <li><a href="landing.html">HOME</a></li>
                <li><a href="menu.html">MENU</a></li>
                <li><a href="reservation.html">RESERVATION</a></li>
                <li><a href="orders.html">ORDERS</a></li>
            </ul>

            <div class="nav-actions">
                <a href="cart.html" class="nav-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z" />
                        <line x1="3" y1="6" x2="21" y2="6" />
                        <path d="M16 10a4 4 0 0 1-8 0" />
                    </svg>
                </a>
                <a href="profile.html" class="nav-icon user-circle">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                    </svg>
                </a>
            </div>
        </div>
    </nav>

    <section class="menu">
        <h1 class="heading">Our Menu</h1>
        <p class="subheading">SELECT FROM OUR SIGNATURE CATEGORIES</p>

        <div id="categoryContainer" class="menu-categories"></div>

        <div id="menuContainer" class="menu-grid"></div>
    </section>

    <script src="menu.js"></script>

</body>

<style>
    :root {
        --primary-green: #0d2b1f;
        /* Lighter/Premium Green */
        --accent-orange: #ff7043;
        --card-bg: #143528;
        /* Matched with Cart cards */
        --text-muted: #8ca398;
        --border-dark: rgba(255, 255, 255, 0.08);
        --input-bg: #0a2118;
        --nav-gradient: linear-gradient(to bottom, rgba(7, 20, 15, 0.95), transparent);
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
        scroll-behavior: smooth;
    }

    body {
        background: var(--primary-green);
        color: white;
        line-height: 1.6;
        padding-top: 120px;
        /* Space for fixed navbar */
    }

    /* ==========================================
   NAVBAR (Consistent Theme)
========================================== */
    .navbar {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 1000;
        padding: 25px 8%;
        background: var(--nav-gradient);
    }

    .nav-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        max-width: 1400px;
        margin: 0 auto;
    }

    .brand {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .brand-icon img {
        width: 40px;
        height: 40px;
        background: var(--accent-orange);
        padding: 6px;
        border-radius: 50%;
    }

    .brand-name {
        font-family: 'Playfair Display', serif;
        font-weight: 700;
        font-size: 1.4rem;
        color: white;
    }

    .nav-links {
        display: flex;
        list-style: none;
        gap: 35px;
    }

    .nav-links a {
        text-decoration: none;
        color: var(--text-muted);
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 1.5px;
        transition: 0.3s;
        text-transform: uppercase;
    }

    .nav-links a.active,
    .nav-links a:hover {
        color: var(--accent-orange);
        border-bottom: 2px solid var(--accent-orange);
        padding-bottom: 5px;
    }

    .nav-actions {
        display: flex;
        align-items: center;
        gap: 20px;
    }

    .nav-icon {
        color: white;
        display: flex;
        transition: 0.3s;
        text-decoration: none;
    }

    .nav-icon:hover {
        color: var(--accent-orange);
    }

    .user-circle {
        background: var(--card-bg);
        padding: 8px;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.05);
    }

    /* ==========================================
   MENU HERO SECTION 
========================================== */
    .menu {
        padding: 40px 8% 100px;
        text-align: center;
    }

    .heading {
        font-family: 'Playfair Display', serif;
        font-size: 4.5rem;
        line-height: 1;
        margin-bottom: 10px;
    }

    .subheading {
        color: var(--accent-orange);
        font-size: 0.8rem;
        font-weight: 800;
        letter-spacing: 4px;
        margin-bottom: 50px;
        text-transform: uppercase;
    }

    /* ==========================================
   CATEGORY TABS (Dynamic JS)
========================================== */
    .menu-categories {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 15px;
        max-width: 1000px;
        margin: 0 auto 60px auto;
    }

    .menu-categories button {
        background: var(--input-bg);
        border: 1px solid var(--border-dark);
        color: var(--text-muted);
        padding: 14px 32px;
        border-radius: 50px;
        font-size: 0.75rem;
        font-weight: 800;
        cursor: pointer;
        transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .menu-categories button:hover {
        border-color: var(--accent-orange);
        color: white;
    }

    .menu-categories button.active {
        background: var(--accent-orange);
        border-color: var(--accent-orange);
        color: white;
        box-shadow: 0 8px 20px rgba(255, 112, 67, 0.3);
    }

    /* ==========================================
   MENU GRID & CARDS
========================================== */
    .menu-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 35px;
        max-width: 1400px;
        margin: 0 auto;
    }

    .menu-card {
        background: var(--card-bg);
        border-radius: 35px;
        overflow: hidden;
        transition: 0.4s ease;
        display: flex;
        flex-direction: column;
        border: 1px solid rgba(255, 255, 255, 0.03);
        position: relative;
    }

    .menu-card:hover {
        transform: translateY(-12px);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        border-color: rgba(255, 112, 67, 0.2);
    }

    .menu-card img {
        width: 100%;
        height: 250px;
        object-fit: cover;
        transition: 0.5s ease;
    }

    .menu-card:hover img {
        transform: scale(1.05);
    }

    .card-info {
        padding: 30px;
        text-align: left;
        display: flex;
        flex-direction: column;
        flex-grow: 1;
    }

    .card-info h3 {
        font-family: 'Playfair Display', serif;
        font-size: 1.5rem;
        margin-bottom: 10px;
        color: white;
    }

    .item-desc {
        color: var(--text-muted);
        font-size: 0.8rem;
        margin-bottom: 20px;
        line-height: 1.5;
        flex-grow: 1;
    }

    .price-box {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: auto;
    }

    .price {
        color: var(--accent-orange);
        font-weight: 900;
        font-size: 1.4rem;
        font-family: 'Playfair Display', serif;
    }

    .add-to-cart {
        background: var(--input-bg);
        border: 1px solid var(--border-dark);
        color: white;
        padding: 12px 20px;
        border-radius: 18px;
        font-weight: 700;
        font-size: 0.7rem;
        cursor: pointer;
        transition: 0.3s;
        text-transform: uppercase;
    }

    .add-to-cart:hover {
        background: var(--accent-orange);
        border-color: var(--accent-orange);
        box-shadow: 0 5px 15px rgba(255, 112, 67, 0.2);
    }

    /* ==========================================
   MOBILE RESPONSIVENESS
========================================== */
    @media(max-width: 900px) {
        .nav-links {
            display: none;
        }

        .heading {
            font-size: 3.2rem;
        }

        .menu {
            padding-top: 100px;
        }

        .menu-grid {
            grid-template-columns: 1fr;
        }
    }
</style>

</html>
<script>
    const API_BASE = 'https://localhost:7201/api/Menu';
    let cart = [];

    document.addEventListener('DOMContentLoaded', async () => {
        // 1. Setup User info in Navbar
        const fullName = localStorage.getItem("fullName");
        const customerId = localStorage.getItem("customer_id");
        const navUser = document.getElementById("user-display-section");
        if (fullName && customerId) {
            // Change text to show name, but keep the link going to account.html
            navUser.innerHTML = `<a href="account.html">Hi, ${fullName.split(' ')[0]} 👤</a>`;
        }

        // 2. Setup Cart
        const savedCart = localStorage.getItem("cart");
        if (savedCart) cart = JSON.parse(savedCart);
        updateCartCount();

        // 3. Load UI Data
        await loadCategories();
        await loadMenu(0); // Load "All Items" by default
    });

    // Category loader
    async function loadCategories() {
        try {
            const res = await fetch(`${API_BASE}/categories`);
            const categories = await res.json();
            const container = document.getElementById('categories');

            // Render buttons
            let html = `<button class="cat-pill active" data-id="0" onclick="handleCategoryClick(this, 0)">All Items</button>`;
            categories.forEach(c => {
                html += `<button class="cat-pill" data-id="${c.category_id}" onclick="handleCategoryClick(this, ${c.category_id})">${c.category_name}</button>`;
            });

            container.innerHTML = html;
        } catch (err) {
            console.error(err);
            document.getElementById('categories').innerHTML = '<button class="cat-pill active">All Items</button>';
        }
    }

    // Function to handle clicking on a category button
    function handleCategoryClick(buttonElement, categoryId) {
        // Tanggalin ang 'active' class sa lahat ng buttons
        const allPills = document.querySelectorAll('.cat-pill');
        allPills.forEach(p => p.classList.remove('active'));

        // Idagdag ang 'active' class sa pinindot
        buttonElement.classList.add('active');

        // I-load ang menus para sa category na ito
        loadMenu(categoryId);
    }

    // Menu loader (Handles both 'All' and specific categories)
    async function loadMenu(categoryId) {
        const container = document.getElementById("menu-container");
        container.innerHTML = `<p style="grid-column:1/-1; text-align:center; color:var(--text-muted)">Loading menu...</p>`;

        try {
            // Kung 0 ang id, tatawagin niya ang GET ALL. Kung hindi, GET BY CATEGORY.
            const url = (categoryId === 0) ? API_BASE : `${API_BASE}/category/${categoryId}`;
            const res = await fetch(url);
            const menuItems = await res.json();

            displayMenu(menuItems);
        } catch (err) {
            console.error(err);
            container.innerHTML = `<p style="grid-column:1/-1; text-align:center; color:#ff4d4d">Failed to load menu from server.</p>`;
        }
    }

    // Render Menu Cards
    function displayMenu(items) {
        const container = document.getElementById("menu-container");

        if (!items || items.length === 0) {
            container.innerHTML = `<p style="grid-column:1/-1; text-align:center; color:var(--text-muted)">No items found in this category.</p>`;
            return;
        }

        container.innerHTML = items.map(item => {
            // Fallback data if API fields are missing
            const price = item.price ? item.price.toFixed(0) : "0";
            const name = item.food_name || item.name || "Unknown Item";
            const desc = item.description || 'Signature Fedelicious special dish.';

            // Handle image based on your database structure (base64 vs URL)
            let imgSrc = 'https://via.placeholder.com/300x200?text=Food';
            if (item.image) {
                imgSrc = item.image.startsWith('data:') ? item.image : `data:image/jpeg;base64,${item.image}`;
            } else if (item.picture) {
                imgSrc = item.picture.startsWith('data:') ? item.picture : `data:image/jpeg;base64,${item.picture}`;
            }

            return `
        <div class="menu-card">
            <div class="price-tag">₱${price}</div>
            <img src="${imgSrc}" alt="${name}">
            <div class="menu-info">
                <h4>${name}</h4>
                <p>${desc}</p>
                <button class="btn-add" onclick="addToCart(${item.menu_id}, '${name}', ${price})">+ ADD TO CART</button>
            </div>
        </div>
        `;
        }).join('');
    }

    // Cart Logic
    function addToCart(id, name, price) {
        const customerId = localStorage.getItem("customer_id") || localStorage.getItem("customerId"); // Handle both possible variable names

        if (!customerId) {
            alert("Please login to add items to your cart!");
            window.location.href = "login.html";
            return;
        }

        const existing = cart.find(i => i.id === id);
        if (existing) {
            existing.qty++;
        } else {
            cart.push({ id, name, price: parseFloat(price), qty: 1 });
        }

        localStorage.setItem("cart", JSON.stringify(cart));
        updateCartCount();

        // Optional: Small visual feedback
        const btn = event.target;
        btn.innerHTML = "✔ ADDED";
        btn.style.background = "var(--accent-orange)";
        setTimeout(() => {
            btn.innerHTML = "+ ADD TO CART";
            btn.style.background = "rgba(255,255,255,0.05)";
        }, 1000);
    }

    function updateCartCount() {
        const countEl = document.getElementById("cart-count");
        const totalQty = cart.reduce((sum, item) => sum + item.qty, 0);
        countEl.innerText = totalQty;
    }
</script>
</body>

</html>
