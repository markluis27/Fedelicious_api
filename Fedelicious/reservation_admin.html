<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fedelicious Admin | Reservations Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-light: #f4f7f6;
            --sidebar-dark: #09261c;
            --accent-orange: #ea5b0c;
            --status-green: #4caf50;
            --status-blue: #7986cb;
            --status-red: #e74c3c;
            --white: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --border: rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-light);
            display: flex;
            min-height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 260px;
            background-color: var(--sidebar-dark);
            color: white;
            padding: 30px 20px;
            position: fixed;
            height: 100vh;
            z-index: 100;
            display: flex;
            flex-direction: column;
        }

        .sidebar h2 {
            color: #66bb6a;
            font-size: 1.4rem;
            margin-bottom: 40px;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            gap: 15px;
            color: #a3b8b0;
            text-decoration: none;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            transition: 0.3s;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background: #66bb6a;
            color: white;
        }

        .main {
            margin-left: 260px;
            padding: 30px 50px;
            width: calc(100% - 260px);
            overflow-y: auto;
            height: 100vh;
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            gap: 20px;
            flex-wrap: wrap;
        }

        .filter-tabs {
            display: flex;
            background: var(--white);
            padding: 5px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            gap: 5px;
        }

        .tab-btn {
            padding: 10px 18px;
            border-radius: 12px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            color: var(--text-muted);
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--sidebar-dark);
            color: var(--white);
        }

        .tab-btn span {
            background: var(--accent-orange);
            color: var(--white);
            padding: 2px 7px;
            border-radius: 6px;
            font-size: 0.7rem;
            margin-left: 6px;
        }

        .stats-row {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: var(--white);
            padding: 25px;
            border-radius: 20px;
            flex: 1;
            min-width: 220px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            border-bottom: 4px solid #eee;
        }

        .stat-card h3 {
            font-size: 1.8rem;
            color: var(--text-main);
            font-weight: 800;
        }

        .stat-card p {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 700;
            margin-top: 5px;
        }

        .stat-total { border-color: var(--sidebar-dark); }
        .stat-confirmed { border-color: var(--status-green); }
        .stat-pending { border-color: var(--accent-orange); }

        .res-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 50px;
        }

        .res-card {
            background: var(--white);
            padding: 25px;
            border-radius: 25px;
            display: grid;
            grid-template-columns: 60px 1fr auto auto;
            align-items: center;
            gap: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            border: 1px solid var(--border);
            transition: 0.3s;
        }

        .res-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .avatar-box {
            width: 55px;
            height: 55px;
            background: #edf2f0;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4caf50;
            font-size: 1.3rem;
        }

        .info-content h4 {
            font-size: 1.05rem;
            color: var(--text-main);
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .meta-line {
            display: flex;
            gap: 20px;
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(6, minmax(110px, auto));
            gap: 20px;
            padding-top: 15px;
            border-top: 1px dashed #eee;
            width: 100%;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .detail-item small {
            font-size: 0.65rem;
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .detail-item span {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-main);
            word-break: break-word;
        }

        .ref-code {
            color: var(--accent-orange) !important;
            font-family: monospace;
            font-size: 1rem !important;
        }

        .qr-badge {
            display: inline-block;
            background: #eef6ff;
            color: #2c5aa0;
            border-radius: 8px;
            padding: 4px 10px;
            font-size: 0.78rem !important;
            font-weight: 700 !important;
            width: fit-content;
        }

        .status-container {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
            margin-right: 15px;
            min-width: 130px;
        }

        .status-badge {
            color: var(--white);
            padding: 6px 15px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-align: center;
            min-width: 110px;
        }

        .table-badge {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 6px 15px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 800;
        }

        .action-btns {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            transition: 0.2s;
        }

        .btn-confirm {
            background: #f0f4f2;
            color: #4caf50;
        }

        .btn-confirm:hover {
            background: #4caf50;
            color: var(--white);
        }

        .btn-delete {
            background: #fff1f0;
            color: var(--status-red);
        }

        .btn-delete:hover {
            background: var(--status-red);
            color: var(--white);
        }

        .btn-delete:disabled,
        .btn-confirm:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .confirmed-icon {
            color: var(--status-green);
            font-size: 2rem;
        }

        .empty-state,
        .loading-state,
        .error-state {
            background: var(--white);
            padding: 35px;
            border-radius: 20px;
            text-align: center;
            color: var(--text-muted);
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
        }

        .main::-webkit-scrollbar {
            width: 6px;
        }

        .main::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 10px;
        }

        @media (max-width: 1200px) {
            .res-card {
                grid-template-columns: 60px 1fr;
            }

            .status-container,
            .action-btns {
                grid-column: 2 / 3;
            }
        }

        @media (max-width: 900px) {
            .sidebar {
                display: none;
            }

            .main {
                margin-left: 0;
                width: 100%;
                padding: 20px;
            }

            .details-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .details-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<aside class="sidebar">
    <h2>FEDELICIOUS</h2>
    <a href="admin.html"><i class="fas fa-th-large"></i> DASHBOARD</a>
    <a href="order_admin.html"><i class="fas fa-shopping-cart"></i> ORDERS</a>
    <a href="reservation_admin.html" class="active"><i class="fas fa-calendar-alt"></i> RESERVATIONS</a>
    <a href="menusetting.html"><i class="fas fa-utensils"></i> MENU SETTINGS</a>
    <a href="salesreport.html"><i class="fas fa-chart-line"></i> SALES REPORT</a>
    <a href="customeractivity.html"><i class="fa fa-user"></i> CUSTOMER ACTIVITY</a>
    <a href="admin_management.html" id="superAdminLink"><i class="fas fa-user-shield"></i> SYSTEM ADMINS</a>
    <a href="#" style="margin-top: auto; color: #e74c3c;" onclick="logout()"><i class="fas fa-sign-out-alt"></i> SIGN OUT</a>
</aside>

<main class="main">
    <div class="header-section">
        <div>
            <h2 style="font-weight: 800; color: var(--sidebar-dark);">RESERVATIONS</h2>
            <p style="font-size: 0.85rem; color: var(--text-muted);">Reservation and payment tracking</p>
        </div>

        <div class="filter-tabs">
            <button class="tab-btn active" id="tab-all" onclick="filterReservations('all')">All Bookings</button>
            <button class="tab-btn" id="tab-confirmed" onclick="filterReservations('confirmed')">Confirmed</button>
            <button class="tab-btn" id="tab-pending" onclick="filterReservations('pending')">Pending <span id="pending-badge">0</span></button>
        </div>
    </div>

    <div class="stats-row">
        <div class="stat-card stat-total">
            <h3 id="total-count">0</h3>
            <p>Total Reservations</p>
        </div>
        <div class="stat-card stat-confirmed">
            <h3 id="confirmed-count">0</h3>
            <p>Confirmed Reservations</p>
        </div>
        <div class="stat-card stat-pending">
            <h3 id="pending-stat">0</h3>
            <p>Waiting Verification</p>
        </div>
    </div>

    <div id="res-list" class="res-container">
        <div class="loading-state">Loading reservations...</div>
    </div>
</main>

<script>
    const SP_API = "https://localhost:7201/api/Sp/reservations";
    const ACTION_API = "https://localhost:7201/api/Reservation";

    let allReservations = [];
    let currentFilter = "all";

    async function loadReservations() {
        const container = document.getElementById("res-list");
        container.innerHTML = `<div class="loading-state">Loading reservations...</div>`;

        try {
            const res = await fetch(SP_API, {
                headers: {
                    "accept": "*/*"
                }
            });

            if (!res.ok) {
                throw new Error(`Failed to load reservations. Status: ${res.status}`);
            }

            const data = await res.json();
            allReservations = Array.isArray(data) ? data : [];

            updateDashboardUI();
        } catch (e) {
            console.error("Load Reservation Error:", e);
            container.innerHTML = `
                <div class="error-state">
                    Failed to load reservation data.<br>
                    Check your API / SP endpoint.
                </div>
            `;
        }
    }

    function updateDashboardUI() {
        const pendingCount = allReservations.filter(r => {
            const status = (r.reservation_status || "").toLowerCase();
            return status.includes("waiting") || status === "pending";
        }).length;

        const confirmedCount = allReservations.filter(r => {
            const status = (r.reservation_status || "").toLowerCase();
            return status === "confirmed";
        }).length;

        document.getElementById("total-count").innerText = allReservations.length;
        document.getElementById("confirmed-count").innerText = confirmedCount;
        document.getElementById("pending-stat").innerText = pendingCount;
        document.getElementById("pending-badge").innerText = pendingCount;

        filterReservations(currentFilter);
    }

    function filterReservations(type) {
        currentFilter = type;

        document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
        const activeTab = document.getElementById("tab-" + type);
        if (activeTab) {
            activeTab.classList.add("active");
        }

        let filtered = [...allReservations];

        if (type === "pending") {
            filtered = allReservations.filter(r => {
                const status = (r.reservation_status || "").toLowerCase();
                return status.includes("waiting") || status === "pending";
            });
        } else if (type === "confirmed") {
            filtered = allReservations.filter(r => {
                const status = (r.reservation_status || "").toLowerCase();
                return status === "confirmed";
            });
        }

        renderCards(filtered);
    }

    function getStatusColor(status) {
        const s = (status || "").toLowerCase();

        if (s.includes("waiting") || s === "pending") return "var(--status-blue)";
        if (s === "confirmed") return "var(--status-green)";
        if (s === "cancelled") return "var(--status-red)";

        return "#95a5a6";
    }

    function formatDate(dateValue) {
        if (!dateValue) return "N/A";
        const date = new Date(dateValue);
        if (isNaN(date.getTime())) return "N/A";

        return date.toLocaleDateString("en-US", {
            month: "short",
            day: "numeric",
            year: "numeric"
        });
    }

    function formatAmount(value) {
        const amount = Number(value || 0);
        return amount.toLocaleString("en-PH", {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
        });
    }

    function formatTime(value) {
        if (!value) return "N/A";

        if (typeof value === "string" && value.includes(":")) {
            const parts = value.split(":");
            const hour = parseInt(parts[0], 10);
            const minute = parts[1] || "00";

            if (!isNaN(hour)) {
                const suffix = hour >= 12 ? "PM" : "AM";
                const hour12 = hour % 12 || 12;
                return `${hour12}:${minute} ${suffix}`;
            }
        }

        return value;
    }

    function escapeHtml(value) {
        if (value === null || value === undefined) return "";
        return String(value)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    function renderCards(data) {
        const container = document.getElementById("res-list");

        if (!data.length) {
            container.innerHTML = `<div class="empty-state">No reservations found for this filter.</div>`;
            return;
        }

        container.innerHTML = data.map(item => {
            const statusText = item.reservation_status || "Unknown";
            const isWaiting = statusText.toLowerCase().includes("waiting") || statusText.toLowerCase() === "pending";
            const statusBg = getStatusColor(statusText);

            const customerName = item.full_name || item.customerName || "GUEST CUSTOMER";
            const reservationDate = formatDate(item.reservation_date);
            const reservationTime = formatTime(item.reservation_time);
            const referenceNumber = item.reference_number || "N/A";
            const customerPhone = item.customer_phone || "No Phone";
            const amount = formatAmount(item.payment_amount);
            const notes = item.notes || "No instructions";
            const qrName = item.qr_name || "No QR Recorded";
            const qrAccName = item.qr_accname || "No Account Name";

            return `
                <div class="res-card">
                    <div class="avatar-box">
                        <i class="fas fa-user-circle"></i>
                    </div>

                    <div class="info-content">
                        <h4>${escapeHtml(customerName)}</h4>

                        <div class="meta-line">
                            <span><i class="far fa-calendar-alt"></i> ${reservationDate}</span>
                            <span><i class="far fa-clock"></i> ${escapeHtml(reservationTime)}</span>
                        </div>

                        <div class="details-grid">
                            <div class="detail-item">
                                <small>Ref Number</small>
                                <span class="ref-code">${escapeHtml(referenceNumber)}</span>
                            </div>

                            <div class="detail-item">
                                <small>Phone Number</small>
                                <span>${escapeHtml(customerPhone)}</span>
                            </div>

                            <div class="detail-item">
                                <small>Amount</small>
                                <span>₱${amount}</span>
                            </div>

                            <div class="detail-item">
                                <small>QR Used</small>
                                <span class="qr-badge">${escapeHtml(qrName)}</span>
                            </div>

                            <div class="detail-item">
                                <small>QR Account Name</small>
                                <span>${escapeHtml(qrAccName)}</span>
                            </div>

                            <div class="detail-item">
                                <small>Notes</small>
                                <span>${escapeHtml(notes)}</span>
                            </div>
                        </div>
                    </div>

                    <div class="status-container">
                        <div class="status-badge" style="background: ${statusBg}">
                            ${escapeHtml(statusText.toUpperCase())}
                        </div>
                        <div class="table-badge">TABLE T-0${escapeHtml(item.reservation_id)}</div>
                    </div>

                    <div class="action-btns">
                        ${
                            isWaiting
                                ? `<button class="btn btn-confirm" onclick="confirmReservation(${item.reservation_id})" title="Confirm"><i class="fas fa-check"></i></button>`
                                : `<i class="fas fa-check-circle confirmed-icon" title="Verified"></i>`
                        }
                        <button class="btn btn-delete" onclick="deleteRes(${item.reservation_id})" title="Delete">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                </div>
            `;
        }).join("");
    }

    async function confirmReservation(id) {
        if (!confirm("Verify payment and confirm booking?")) return;

        try {
            const res = await fetch(`${ACTION_API}/confirm/${id}`, {
                method: "PUT",
                headers: {
                    "accept": "*/*"
                }
            });

            const result = await res.json().catch(() => null);

            if (res.ok) {
                alert(result?.message || "Reservation confirmed successfully.");
                loadReservations();
            } else {
                alert(result?.message || "Failed to confirm reservation.");
                console.error("Confirm Reservation Error:", result);
            }
        } catch (err) {
            console.error("Confirm Reservation Fetch Error:", err);
            alert("Error updating reservation.");
        }
    }

    async function deleteRes(id) {
        if (!confirm("Delete this record permanently?")) return;

        try {
            const res = await fetch(`${ACTION_API}/${id}`, {
                method: "DELETE",
                headers: {
                    "accept": "*/*"
                }
            });

            const result = await res.json().catch(() => null);

            if (res.ok) {
                alert(result?.message || "Reservation deleted successfully.");
                loadReservations();
            } else {
                alert(result?.message || "Failed to delete reservation.");
                console.error("Delete Reservation Error:", result);
            }
        } catch (err) {
            console.error("Delete Reservation Fetch Error:", err);
            alert("Error deleting record.");
        }
    }

    function logout() {
        localStorage.clear();
        window.location.href = "login.html";
    }

    document.addEventListener("DOMContentLoaded", () => {
        const role = (localStorage.getItem("role") || "").trim().toLowerCase();
        const superAdminLink = document.getElementById("superAdminLink");

        if (role && role !== "super admin" && superAdminLink) {
            superAdminLink.style.display = "none";
        }

        loadReservations();
        setInterval(loadReservations, 30000);
    });
</script>
</body>
</html>
