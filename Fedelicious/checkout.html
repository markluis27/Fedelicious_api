<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fedelicious | Checkout & Payment</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Poppins:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* ==========================
           FEDELICIOUS THEME
        ========================== */
        :root {
            --primary-green: #0d2b1f;
            --secondary-green: #07140f;
            --card-bg: #143528;
            --text-muted: #8ca398;
            --accent-orange: #ff7043;
            --input-bg: #0a2118;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: var(--primary-green);
            color: white;
            overflow-x: hidden;
        }

        /* ==========================
           MAIN LAYOUT
        ========================== */
        .container {
            display: flex;
            max-width: 1350px;
            margin: auto;
            gap: 60px;
            padding: 90px 8% 80px;
            align-items: flex-start;
        }

        .bag-section {
            flex: 1.2;
        }

        .bag-section h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.8rem, 5vw, 4rem);
            line-height: 1;
            margin-bottom: 10px;
        }

        .bag-section p {
            color: var(--accent-orange);
            font-weight: 800;
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 35px;
        }

        /* ==========================
           CART ITEMS
        ========================== */
        .cart-item {
            background: rgba(20, 53, 40, 0.85);
            padding: 20px 25px;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
            transition: 0.3s ease;
        }

        .cart-item:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 112, 67, 0.25);
        }

        .item-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .item-img {
            width: 65px;
            height: 65px;
            background: var(--input-bg);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-orange);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .item-info h4 {
            margin: 0;
            font-weight: 700;
            font-size: 1rem;
        }

        .item-info small {
            color: var(--text-muted);
            font-weight: 600;
        }

        /* ==========================
           RIGHT SIDE PAYMENT CARD
        ========================== */
        .right-side {
            flex: 0.85;
            background: rgba(20, 53, 40, 0.9);
            padding: 45px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            position: sticky;
            top: 60px;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.35);
        }

        /* ==========================
           SERVICE TABS
        ========================== */
        .service-tabs {
            display: flex;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 18px;
            padding: 6px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--text-muted);
            transition: 0.3s;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .tab.active {
            background: var(--accent-orange);
            color: white;
        }

        /* ==========================
           FORM INPUTS
        ========================== */
        label {
            font-size: 0.65rem;
            color: var(--text-muted);
            font-weight: 800;
            margin-bottom: 10px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-box {
            background: var(--input-bg);
            border-radius: 15px;
            display: flex;
            align-items: center;
            margin-bottom: 18px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            height: 55px;
            padding: 0 18px;
            position: relative;
            transition: 0.3s ease;
        }

        .input-box:focus-within {
            border-color: rgba(255, 112, 67, 0.5);
            box-shadow: 0 0 15px rgba(255, 112, 67, 0.12);
        }

        .input-box i {
            color: var(--accent-orange);
            margin-right: 15px;
            font-size: 1rem;
        }

        .input-box input,
        .input-box select {
            background: transparent;
            border: none;
            color: white;
            width: 100%;
            height: 100%;
            outline: none;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
        }

        .input-box input::placeholder {
            color: rgba(140, 163, 152, 0.7);
            font-weight: 500;
        }

        input[type="date"]::-webkit-calendar-picker-indicator,
        input[type="time"]::-webkit-calendar-picker-indicator {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        /* ==========================
           TOTAL
        ========================== */
        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .total-row span:first-child {
            font-family: 'Playfair Display';
            font-style: italic;
            font-size: 1.5rem;
        }

        .total-price {
            font-size: 2.7rem;
            font-weight: 700;
            color: var(--accent-orange);
            font-family: 'Playfair Display', serif;
        }

        /* ==========================
           BUTTON
        ========================== */
        .btn-confirm {
            width: 100%;
            padding: 20px;
            background: var(--accent-orange);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            font-size: 0.85rem;
        }

        .btn-confirm:hover {
            background: #ff8a65;
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255, 112, 67, 0.35);
        }

        .btn-confirm:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* ==========================
           MODAL
        ========================== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 20px;
        }

        .payment-modal {
            background: rgba(20, 53, 40, 0.95);
            padding: 45px;
            border-radius: 40px;
            width: 450px;
            max-width: 95%;
            text-align: center;
            border: 1px solid rgba(255, 112, 67, 0.3);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
        }

        .qr-container {
            background: white;
            width: 200px;
            height: 200px;
            margin: 0 auto 20px;
            border-radius: 18px;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qr-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .queue-badge {
            background: rgba(0, 0, 0, 0.25);
            color: var(--accent-orange);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 800;
            margin-bottom: 20px;
            display: inline-block;
            border: 1px solid rgba(255, 112, 67, 0.2);
            letter-spacing: 1px;
        }

        .qr-details {
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 18px;
            padding: 14px 16px;
            margin: 12px 0 20px 0;
            text-align: left;
        }

        .qr-details div {
            font-size: 0.82rem;
            margin: 6px 0;
            color: var(--text-muted);
            font-weight: 600;
        }

        .qr-details strong {
            color: var(--accent-orange);
        }

        .close-text {
            font-size: 0.7rem;
            color: var(--text-muted);
            cursor: pointer;
            margin-top: 15px;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .close-text:hover {
            color: white;
        }

        /* ==========================
           RESPONSIVE
        ========================== */
        @media (max-width: 1000px) {
            .container {
                flex-direction: column;
                gap: 50px;
            }

            .right-side {
                position: relative;
                top: 0;
            }
        }

        @media (max-width: 600px) {
            .container {
                padding: 70px 6% 60px;
            }

            .right-side {
                padding: 35px 25px;
            }

            .total-price {
                font-size: 2.2rem;
            }
        }
    </style>
</head>

<body>

    <!-- MAIN -->
    <div class="container">
        <div class="bag-section">
            <h1>YOUR BAG</h1>
            <p>Selected Delicacies</p>
            <div id="cart-list"></div>
        </div>

        <div class="right-side">
            <div class="service-tabs">
                <div class="tab active" onclick="setService('Dine-in', this)">DINE-IN</div>
                <div class="tab" onclick="setService('Pick-up', this)">PICK-UP</div>
                <div class="tab" onclick="setService('Delivery', this)">DELIVERY</div>
            </div>

            <label>Pick Date</label>
            <div class="input-box">
                <i class="fa-regular fa-calendar"></i>
                <input type="date" id="order_date">
            </div>

            <label>Pick Time</label>
            <div class="input-box">
                <i class="fa-regular fa-clock"></i>
                <input type="time" id="order_time">
            </div>

            <div id="delivery-info" style="display:none;">
                <label>Location</label>
                <div class="input-box">
                    <i class="fa-solid fa-truck"></i>
                    <select id="location_fee" onchange="renderTotal()">
                        <option value="15">Bogo (₱15 Fee)</option>
                        <option value="30">San Juan (₱30 Fee)</option>
                    </select>
                </div>

                <label>Exact Address</label>
                <div class="input-box">
                    <i class="fa-solid fa-map-pin"></i>
                    <input type="text" id="delivery_address" placeholder="House No / Street / Brgy">
                </div>
            </div>

            <div class="total-row">
                <span>Total</span>
                <span class="total-price" id="total-display">₱0</span>
            </div>

            <button class="btn-confirm" id="orderBtn" onclick="processOrder()">CONFIRM & PAY →</button>
        </div>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="payment-overlay">
        <div class="payment-modal">
            <h2 id="modal-payment-title"
                style="margin-top:0; margin-bottom: 15px; color:white; font-size: 1.5rem; letter-spacing: 1px;">
                GCASH PAYMENT
            </h2>

            <div>
                <span class="queue-badge" id="queue-no">ORDER: SAVING...</span>
            </div>

            <div class="qr-container">
                <img src="" id="modal-qr-img" alt="Loading QR Code...">
            </div>

            <div class="qr-details">
                <div><strong>Method:</strong> <span id="modal-qr-method">GCash</span></div>
                <div><strong>Account Name:</strong> <span id="modal-qr-accname">Loading...</span></div>
            </div>

            <p style="font-size:0.75rem; color:var(--text-muted);">
                Please scan to pay
                <span id="modal-amount" style="color:var(--accent-orange); font-weight:800; font-size:1rem;"></span>
            </p>

            <div style="text-align: left; margin-top:20px;">
                <label id="account-num-label">Account Number</label>
                <div class="input-box">
                    <i class="fas fa-phone"></i>
                    <input type="text" id="gcash_num" placeholder="09xxxxxxxxx" maxlength="11">
                </div>

                <label>Reference No.</label>
                <div class="input-box">
                    <i class="fas fa-receipt"></i>
                    <input type="text" id="ref_num" placeholder="13-Digit Code">
                </div>
            </div>

            <button class="btn-confirm" id="payment-btn" onclick="submitFinalPayment()">COMPLETE PAYMENT →</button>

            <p class="close-text" onclick="closePaymentModal()">Close & Pay Later</p>
        </div>
    </div>

    <script>
        const API_ORDER = "https://localhost:7201/api/Order";
        const API_PAYMENT = "https://localhost:7201/api/Payment";
        const API_AUTH = "https://localhost:7201/api/Auth/getCustomerId/";
        const API_ACTIVE_QR = "https://localhost:7201/api/PaymentQr/active";

        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        let serviceType = "Dine-in";
        let currentOrderId = null;
        let totalToPay = 0;

        let activePaymentMethodName = "GCash";
        let activePaymentQrId = null;
        let activePaymentQrAccName = "Not Available";

        async function loadActiveQR() {
            try {
                const res = await fetch(API_ACTIVE_QR);

                if (!res.ok) {
                    throw new Error("Failed to fetch active QR.");
                }

                const qrs = await res.json();

                if (qrs && qrs.length > 0) {
                    const activeQr = qrs[0];

                    activePaymentMethodName = activeQr.qr_name || "GCash";
                    activePaymentQrId = activeQr.paymentqr_id || null;
                    activePaymentQrAccName = activeQr.qr_accname || "Not Available";

                    document.getElementById("modal-payment-title").innerText = `${activePaymentMethodName.toUpperCase()} PAYMENT`;
                    document.getElementById("account-num-label").innerText = `${activePaymentMethodName} Number`;
                    document.getElementById("modal-qr-method").innerText = activePaymentMethodName;
                    document.getElementById("modal-qr-accname").innerText = activePaymentQrAccName;

                    if (activeQr.qr_image) {
                        document.getElementById("modal-qr-img").src = `data:image/jpeg;base64,${activeQr.qr_image}`;
                    } else {
                        document.getElementById("modal-qr-img").alt = "No QR image available.";
                    }
                } else {
                    document.getElementById("modal-qr-img").alt = "No active QR found.";
                    document.getElementById("modal-qr-accname").innerText = "No active QR found";
                }
            } catch (e) {
                console.error("Failed to fetch active QR.", e);
                document.getElementById("modal-qr-img").alt = "No active QR found. Pay over counter.";
                document.getElementById("modal-qr-accname").innerText = "Unavailable";
            }
        }

        function renderTotal() {
            const subtotal = cart.reduce((s, i) => s + (Number(i.price) * Number(i.qty)), 0);
            const fee = (serviceType === "Delivery") ? parseInt(document.getElementById("location_fee").value || "0") : 0;

            totalToPay = subtotal + fee;

            document.getElementById("total-display").innerText = "₱" + totalToPay.toLocaleString();

            document.getElementById("cart-list").innerHTML = cart.map(i => `
            <div class="cart-item">
                <div class="item-info">
                    <div class="item-img"><i class="fa-solid fa-utensils"></i></div>
                    <div>
                        <h4 style="margin:0">${i.name}</h4>
                        <small>Qty: ${i.qty}</small>
                    </div>
                </div>
                <div style="font-weight:800">₱${(Number(i.price) * Number(i.qty)).toLocaleString()}</div>
            </div>
        `).join("");
        }

        function setService(type, el) {
            serviceType = type;
            document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
            el.classList.add("active");
            document.getElementById("delivery-info").style.display = (type === "Delivery") ? "block" : "none";
            renderTotal();
        }

        async function processOrder() {
            const date = document.getElementById("order_date").value;
            const time = document.getElementById("order_time").value;
            const fullName = localStorage.getItem("fullName");

            if (!date || !time) {
                alert("Please pick a date and time first.");
                return;
            }

            if (!fullName) {
                alert("Please login first.");
                return;
            }

            const btn = document.getElementById("orderBtn");
            btn.disabled = true;
            btn.innerText = "VERIFYING...";

            try {
                const idRes = await fetch(`${API_AUTH}${encodeURIComponent(fullName)}`);
                const userData = await idRes.json();

                if (!idRes.ok || !userData.customer_id) {
                    alert(userData.message || "Failed to get customer ID.");
                    btn.disabled = false;
                    btn.innerText = "CONFIRM & PAY →";
                    return;
                }

                const cID = userData.customer_id;
                const subtotal = cart.reduce((s, i) => s + (Number(i.price) * Number(i.qty)), 0);
                const deliveryFee = (serviceType === "Delivery") ? parseInt(document.getElementById("location_fee").value || "0") : 0;

                const orderPayload = {
                    order_id: 0,
                    customer_id: cID,
                    order_type: serviceType,
                    order_status: "Waiting for Verification",
                    subtotal: subtotal,
                    delivery_fee: deliveryFee,
                    total_amount: totalToPay,
                    payment_status: "Unpaid",
                    order_date: date,
                    preferred_time: time + ":00",
                    delivery_address: serviceType === "Delivery"
                        ? document.getElementById("delivery_address").value.trim()
                        : "N/A"
                };

                const res = await fetch(API_ORDER, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(orderPayload)
                });

                if (res.ok) {
                    const result = await res.json();
                    currentOrderId = result.order_id || (result.data ? result.data.order_id : null);

                    if (currentOrderId) {
                        localStorage.setItem("latest_order_id", currentOrderId);
                        document.getElementById("queue-no").innerText = "ORDER ID: #" + currentOrderId;
                        document.getElementById("modal-amount").innerText = "₱" + totalToPay.toLocaleString();
                        document.getElementById("payment-overlay").style.display = "flex";
                    } else {
                        alert("Order saved but order ID was not returned.");
                    }
                } else {
                    const errResult = await res.json();
                    alert("Error: " + (errResult.message || "Failed to save order."));
                }
            } catch (e) {
                console.error(e);
                alert("Connection error to server.");
            } finally {
                btn.disabled = false;
                btn.innerText = "CONFIRM & PAY →";
            }
        }

        async function submitFinalPayment() {
            const gNum = document.getElementById("gcash_num").value.trim();
            const rNum = document.getElementById("ref_num").value.trim();
            const orderId = currentOrderId || localStorage.getItem("latest_order_id");

            if (!orderId) {
                alert("Error: Order ID missing.");
                return;
            }

            if (gNum.length < 11 || rNum.length < 5) {
                alert("Please fill up payment details.");
                return;
            }

            if (!activePaymentQrId) {
                alert("No active payment QR found. Please contact admin.");
                return;
            }

            const btn = document.getElementById("payment-btn");
            btn.disabled = true;
            btn.innerText = "PROCESSING...";

            const payPayload = {
                payment_id: 0,
                order_id: parseInt(orderId),
                reservation_id: null,
                payment_method: activePaymentMethodName,
                paymentqr_id: activePaymentQrId,
                amount: totalToPay,
                reference_number: rNum,
                customer_phone: gNum,
                payment_status: "Pending Verification",
                payment_date: new Date().toISOString()
            };

            console.log("SENDING TO API:", payPayload);

            try {
                const res = await fetch(API_PAYMENT, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payPayload)
                });

                if (res.ok) {
                    alert(`Success! Your ${activePaymentMethodName} payment for Order #${orderId} is submitted.`);
                    localStorage.removeItem("cart");
                    localStorage.removeItem("latest_order_id");
                    window.location.href = "orders.html";
                } else {
                    const err = await res.json();
                    if (err.errors) {
                        console.error("Validation Errors:", err.errors);
                        alert("API Error: May kulang sa pinasang data. Paki-check ang console (F12).");
                    } else {
                        alert(err.message || "Payment submission failed.");
                    }
                }
            } catch (e) {
                console.error(e);
                alert("Payment server error.");
            } finally {
                btn.disabled = false;
                btn.innerText = "COMPLETE PAYMENT →";
            }
        }

        function closePaymentModal() {
            document.getElementById("payment-overlay").style.display = "none";
        }

        renderTotal();
        loadActiveQR();

        document.getElementById("order_date").min = new Date().toISOString().split("T")[0];
    </script>

</body>

</html>
