<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fedelicious | Order History</title>
    <link rel="stylesheet" href="order.css">
</head>

<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="brand">
                <div class="brand-icon">
                    <img src="images/fede.png" alt="Fedelicious Logo">
                </div>
                <span class="brand-name">Fedelicious</span>
            </div>

            <ul class="nav-links">
                <li><a href="landing.html">HOME</a></li>
                <li><a href="menu.html">MENU</a></li>
                <li><a href="reservation.html">RESERVATION</a></li>
                <li><a href="orders.html" class="active">ORDERS</a></li>
            </ul>

            <div class="nav-actions">
                <a href="cart.html" class="nav-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z" />
                        <line x1="3" y1="6" x2="21" y2="6" />
                        <path d="M16 10a4 4 0 0 1-8 0" />
                    </svg>
                </a>
                <div class="user-circle">
                    <a href="profile.html" class="nav-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
                            <circle cx="12" cy="7" r="4" />
                        </svg>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <header class="order-header">
        <h1 class="order-title">ORDER HISTORY</h1>
        <p class="order-subtitle">TRANSACTION & STATUS TRACKING</p>
    </header>

    <main id="ordersList" class="order-container"></main>

    <div id="orderModal" class="modal-overlay">
        <div class="modal-card">
            <button class="modal-close-x" id="closeModal">&times;</button>
            <div class="modal-header">
                <div class="receipt-box">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1Z" />
                        <path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8m4-11v11" />
                    </svg>
                </div>
                <h2 class="modal-title">Order Details</h2>
                <p id="modalOrderId" class="order-id-sub">---</p>
            </div>

            <div class="modal-info-grid" id="modalInfo">
            </div>

            <div class="item-breakdown">
                <h3 class="breakdown-header">ITEM BREAKDOWN</h3>
                <div id="modalItems">
                </div>
            </div>

            <div class="modal-footer">
                <div class="total-section">
                    <span class="total-label">TOTAL AMOUNT</span>
                    <h2 id="modalTotal" class="total-amount-display">₱0</h2>
                </div>
                <button class="close-btn-rect" id="closeModalBtn">CLOSE</button>
            </div>
        </div>
    </div>

    <div id="cancelModal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <div class="alert-box">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="#ff4d4d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="8" x2="12" y2="12"></line>
                        <line x1="12" y1="16" x2="12.01" y2="16"></line>
                    </svg>
                </div>
                <h2 class="modal-title">Cancel Order?</h2>
                <p id="cancelOrderId" class="order-id-sub">---</p>
            </div>

            <div class="cancel-body">
                <h3 class="breakdown-header text-center">BAKIT MO GUSTONG I-CANCEL?</h3>
                <div class="cancel-options">
                    <label class="cancel-radio">
                        <input type="radio" name="cancelReason" value="Wrong number of orders">
                        <span class="radio-box">Wrong number of orders</span>
                    </label>
                    <label class="cancel-radio">
                        <input type="radio" name="cancelReason" value="Not going to buy / Changed my mind">
                        <span class="radio-box">Not going to buy / Changed my mind</span>
                    </label>
                    <label class="cancel-radio">
                        <input type="radio" name="cancelReason" value="Ordered by mistake">
                        <span class="radio-box">Ordered by mistake</span>
                    </label>
                    <label class="cancel-radio">
                        <input type="radio" name="cancelReason" value="Found a better deal">
                        <span class="radio-box">Found a better deal</span>
                    </label>
                    <label class="cancel-radio">
                        <input type="radio" name="cancelReason" value="Others / Personal reasons">
                        <span class="radio-box">Others / Personal reasons</span>
                    </label>
                </div>
            </div>

            <div class="modal-actions-row">
                <button class="action-btn-text" id="closeCancel">HUWAG ITULOY</button>
                <button class="action-btn-primary" id="confirmCancelBtn">CONFIRM CANCEL</button>
            </div>
        </div>
    </div>
</body>

<style>
    /* --- UPDATED ORDER.CSS (RESERVATION & CART THEME MATCH) --- */

    :root {
        --primary-green: #0d2b1f;
        /* Matched with reservation.css */
        --accent-orange: #ff7043;
        --card-bg: #143528;
        /* Matched card color */
        --text-muted: #8ca398;
        --border-dark: rgba(255, 255, 255, 0.05);
        /* Subtle border */
        --input-bg: #0a2118;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    body {
        background-color: var(--primary-green);
        color: white;
        padding-top: 120px;
        line-height: 1.6;
    }

    /* ==========================================
   NAVBAR (CONSISTENT DESIGN)
========================================== */
    .navbar {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 1000;
        padding: 25px 8%;
        background: linear-gradient(to bottom, rgba(7, 20, 15, 0.95), transparent);
    }

    .nav-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        max-width: 1400px;
        margin: 0 auto;
    }

    .brand {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .brand-icon img {
        width: 40px;
        height: 40px;
        background: var(--accent-orange);
        padding: 6px;
        border-radius: 50%;
        object-fit: contain;
    }

    .brand-name {
        font-family: 'Playfair Display', serif;
        font-weight: 700;
        font-size: 1.4rem;
        color: white;
    }

    .nav-links {
        display: flex;
        list-style: none;
        gap: 35px;
    }

    .nav-links a {
        text-decoration: none;
        color: var(--text-muted);
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 1.5px;
        transition: 0.3s;
    }

    .nav-links a.active,
    .nav-links a:hover {
        color: var(--accent-orange);
        border-bottom: 2px solid var(--accent-orange);
        padding-bottom: 5px;
    }

    .nav-actions {
        display: flex;
        align-items: center;
        gap: 20px;
    }

    .nav-icon {
        color: white;
        display: flex;
        transition: 0.3s;
        text-decoration: none;
    }

    .nav-icon:hover {
        color: var(--accent-orange);
    }

    .user-circle {
        background: var(--card-bg);
        padding: 8px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* --- HEADER SECTION --- */
    .order-header {
        text-align: center;
        margin-bottom: 50px;
    }

    .order-title {
        font-family: 'Playfair Display', serif;
        font-size: 4.5rem;
        /* Matched title size from cart/reservation */
        line-height: 1;
    }

    .order-subtitle {
        color: var(--accent-orange);
        font-weight: 800;
        font-size: 0.8rem;
        letter-spacing: 3px;
        margin-top: 10px;
    }

    /* --- ORDER CARDS --- */
    .order-container {
        max-width: 1100px;
        margin: 0 auto;
        padding: 0 5% 100px;
    }

    .order-card {
        background: var(--card-bg);
        border-radius: 35px;
        padding: 30px 45px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 25px;
        border: 1px solid var(--border-dark);
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        transition: all 0.3s ease;
    }

    .order-card:hover {
        transform: translateY(-5px);
        border-color: rgba(255, 112, 67, 0.3);
        box-shadow: 0 20px 45px rgba(0, 0, 0, 0.3);
    }

    .order-main {
        display: flex;
        align-items: center;
        gap: 30px;
        flex: 1;
    }

    .status-icon {
        background: var(--input-bg);
        width: 65px;
        height: 65px;
        border-radius: 22px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--border-dark);
    }

    .order-id {
        font-weight: 800;
        font-size: 1.3rem;
        display: block;
        margin-bottom: 6px;
    }

    .status-badge {
        font-size: 0.65rem;
        font-weight: 800;
        padding: 6px 14px;
        border-radius: 20px;
        background: rgba(30, 215, 96, 0.1);
        color: #1ed760;
        border: 1px solid rgba(30, 215, 96, 0.2);
    }

    .order-meta {
        color: var(--text-muted);
        font-size: 0.85rem;
        margin-top: 10px;
    }

    .price-amount {
        font-family: 'Playfair Display', serif;
        font-size: 2.2rem;
        font-weight: 900;
        margin-right: 40px;
        color: var(--accent-orange);
    }

    .action-btn {
        background: var(--input-bg);
        border: 1px solid var(--border-dark);
        color: white;
        width: 55px;
        height: 55px;
        border-radius: 18px;
        cursor: pointer;
        transition: 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .action-btn:hover {
        background: var(--accent-orange);
        border-color: var(--accent-orange);
        transform: rotate(90deg);
        /* Kaunting effect lang sa icon */
    }

    /* --- MODAL LAYOUTS & TYPOGRAPHY --- */
    .modal-card {
        background: #0d2319;
        /* Matched to dark Figma BG */
        width: 90%;
        max-width: 480px;
        /* Slightly slimmer for mobile/app feel */
        padding: 40px;
        border-radius: 30px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
        position: relative;
    }

    .modal-header {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 30px;
        text-align: center;
    }

    .modal-title {
        font-family: 'Playfair Display', serif;
        font-size: 1.8rem;
        font-weight: 700;
        margin-top: 15px;
        margin-bottom: 5px;
    }

    .order-id-sub {
        color: var(--text-muted);
        font-size: 0.8rem;
        letter-spacing: 1px;
        font-weight: 600;
    }

    /* Icons */
    .receipt-box {
        background: #d35400;
        /* Deep orange */
        padding: 12px;
        border-radius: 12px;
        display: inline-flex;
    }

    .alert-box {
        padding: 12px;
        border-radius: 50%;
        display: inline-flex;
        background: rgba(255, 77, 77, 0.1);
    }

    /* Info Grid */
    .modal-info-grid {
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        padding-bottom: 20px;
        margin-bottom: 20px;
    }

    .info-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
        font-size: 0.85rem;
    }

    .info-label {
        color: var(--text-muted);
    }

    .info-value {
        font-weight: 600;
        color: white;
    }

    /* Badges */
    .badge {
        padding: 6px 12px;
        border-radius: 20px;
        font-size: 0.65rem;
        font-weight: 800;
        letter-spacing: 0.5px;
    }

    .badge-confirmed {
        background: rgba(46, 204, 113, 0.15);
        color: #2ecc71;
    }

    .badge-paid {
        background: rgba(52, 152, 219, 0.15);
        color: #3498db;
    }

    /* Item Breakdown */
    .breakdown-header {
        color: var(--text-muted);
        font-size: 0.75rem;
        letter-spacing: 2px;
        margin-bottom: 15px;
    }

    .breakdown-header.text-center {
        text-align: center;
    }

    .item-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 12px;
        font-size: 0.85rem;
        color: #e0e0e0;
    }

    .item-price {
        font-weight: 700;
        color: white;
    }

    /* Footer & Total */
    .modal-footer {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        margin-top: 30px;
        padding-top: 20px;
    }

    .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(7, 20, 15, 0.85);
        backdrop-filter: blur(8px);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 2000;
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition: all 0.3s ease-in-out;
    }

    .modal-overlay.active {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
    }

    .total-label {
        display: block;
        color: var(--text-muted);
        font-size: 0.75rem;
        letter-spacing: 1.5px;
        margin-bottom: 5px;
    }

    .total-amount-display {
        font-family: 'Playfair Display', serif;
        font-size: 2.5rem;
        font-weight: 900;
        color: white;
        /* Changed from orange to white based on Figma */
        line-height: 1;
    }

    .close-btn-rect {
        background: #0a2118;
        color: #2ecc71;
        border: none;
        padding: 12px 24px;
        border-radius: 25px;
        font-size: 0.8rem;
        font-weight: 800;
        letter-spacing: 1px;
        cursor: pointer;
        transition: 0.2s;
    }

    .close-btn-rect:hover {
        background: #133a2a;
    }

    /* --- CANCEL MODAL SPECIFICS --- */
    .cancel-options {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-top: 20px;
        margin-bottom: 30px;
    }

    .cancel-radio input {
        display: none;
        /* Hide default radio */
    }

    .radio-box {
        display: block;
        padding: 15px 20px;
        border: 1px solid #1c4b39;
        border-radius: 12px;
        color: #7b9e8b;
        font-size: 0.85rem;
        cursor: pointer;
        transition: all 0.2s;
    }

    .cancel-radio input:checked+.radio-box,
    .radio-box:hover {
        background: #133a2a;
        border-color: #2ecc71;
        color: white;
    }

    .modal-actions-row {
        display: flex;
        gap: 15px;
        justify-content: center;
    }

    .action-btn-text,
    .action-btn-primary {
        flex: 1;
        padding: 14px 0;
        border-radius: 25px;
        font-size: 0.75rem;
        font-weight: 800;
        letter-spacing: 1px;
        border: none;
        cursor: pointer;
        transition: 0.2s;
    }

    .action-btn-text {
        background: transparent;
        color: #2ecc71;
    }

    .action-btn-text:hover {
        background: rgba(46, 204, 113, 0.1);
    }

    .action-btn-primary {
        background: #0a2118;
        /* Disabled state look by default */
        color: #1c4b39;
    }

    /* Simulate active state if a radio is checked (optional enhancement) */
    .cancel-body:has(input:checked)~.modal-actions-row .action-btn-primary {
        background: #133a2a;
        color: #2ecc71;
    }
</style>


<script>
    const API_BASE = 'https://localhost:7201/api';
    const API_ORDER = `${API_BASE}/Order`;
    const API_RES = `${API_BASE}/Reservation`;
    const API_GET_ID_BY_NAME = `${API_BASE}/Auth/getCustomerId/`;


    let allHistoryItems = [];

    document.addEventListener('DOMContentLoaded', async () => {
        const fullName = localStorage.getItem("fullName");
        if (fullName && fullName !== "null") {
            document.getElementById("user-display-section").innerHTML = `<span onclick="logout()">Hi, ${fullName.split(' ')[0]} 🚪</span>`;

            try {
                const idRes = await fetch(`${API_GET_ID_BY_NAME}${encodeURIComponent(fullName)}`);
                if (!idRes.ok) throw new Error("Customer not found");

                const userData = await idRes.json();
                const customerId = userData.customer_id || userData.customerId;

                await fetchCombinedHistory(customerId);
            } catch (err) {
                showError("Hindi mahanap ang iyong record. Siguraduhing naka-login ka.");
                console.error(err);
            }
        } else {
            showError("Mangyaring mag-login muna para makita ang iyong history.");
        }
    });

    function logout() {
        localStorage.clear();
        window.location.href = "login.html";
    }

    function showError(msg) {
        document.getElementById('orders-list').innerHTML = `
        <div class="empty-state">
            <i class="fas fa-lock" style="color:var(--accent-orange)"></i>
            <p>${msg}</p>
            <br>
            <a href="login.html" style="color:var(--accent-orange); text-decoration:none; font-weight:700; border: 1px solid var(--accent-orange); padding: 10px 20px; border-radius: 10px;">Bumalik sa Login</a>
        </div>
    `;
    }

    async function fetchCombinedHistory(cId) {
        allHistoryItems = [];

        try {
            const [resOrders, resRes] = await Promise.all([
                fetch(`${API_ORDER}/customer/${cId}`),
                fetch(`${API_RES}/customer/${cId}`)
            ]);

            if (resOrders.ok) {
                const orders = await resOrders.json();
                orders.forEach(o => allHistoryItems.push({
                    id: o.order_id,
                    category: 'order',
                    type: 'Food Order - ' + o.order_type,
                    status: o.order_status,
                    paymentStatus: o.payment_status || "Unpaid",
                    price: o.total_amount,
                    date: o.order_date,
                    time: o.preferred_time,
                    extraInfo: o.delivery_address || 'N/A'
                }));
            }

            if (resRes.ok) {
                const reservations = await resRes.json();
                reservations.forEach(r => allHistoryItems.push({
                    id: r.reservation_id,
                    category: 'reservation',
                    type: 'Table Reservation',
                    status: r.reservation_status,
                    paymentStatus: r.payment_status || r.reservation_status,
                    price: r.downpayment_amount || 50,
                    date: r.reservation_date,
                    time: r.reservation_time,
                    extraInfo: r.notes || 'No notes',
                    guests: r.number_of_guests
                }));
            }
        } catch (e) {
            console.error("History fetch error:", e);
        }

        allHistoryItems.sort((a, b) => new Date(b.date) - new Date(a.date));

        if (allHistoryItems.length > 0) {
            document.getElementById('tabs-container').style.display = 'flex';
        }

        renderHistory('all');
    }

    function renderHistory(filterType, btnElement = null) {
        const listDiv = document.getElementById('orders-list');

        if (btnElement) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
        }

        const filteredItems = filterType === 'all'
            ? allHistoryItems
            : allHistoryItems.filter(item => item.category === filterType);

        if (filteredItems.length === 0) {
            listDiv.innerHTML = `<div class="empty-state"><i class="fas fa-receipt"></i><p>Wala kang record para sa kategoryang ito.</p></div>`;
            return;
        }

        listDiv.innerHTML = filteredItems.map((item) => {
            const dateStr = new Date(item.date).toLocaleDateString('en-PH', { year: 'numeric', month: 'short', day: 'numeric' });
            const isReservation = item.category === 'reservation';
            const s = (item.status || "").toLowerCase();

            let badgeClass = 'status-badge';
            if (s.includes('verifi') || s.includes('process') || s.includes('pending')) badgeClass += ' verifying';
            if (s.includes('complet') || s.includes('approv') || s.includes('paid')) badgeClass += ' completed';

            const globalIndex = allHistoryItems.findIndex(x => x.id === item.id && x.category === item.category);

            return `
            <div class="order-card" id="card-${item.category}-${item.id}">
                <div class="order-info">
                    <i class="fa-solid ${isReservation ? 'fa-chair' : 'fa-utensils'}" style="color:var(--accent-orange); font-size:1.8rem; width: 30px; text-align: center;"></i>
                    <div>
                        <div class="order-id-num">
                            ${isReservation ? 'RES' : 'ORD'}-#${item.id} 
                            <span class="${badgeClass}">${item.status}</span>
                        </div>
                        <div class="order-meta">${dateStr} | ${item.type}</div>
                    </div>
                </div>
                <div style="text-align: right;">
                    <div class="order-price">₱${item.price.toLocaleString()}</div>
                    <div class="btn-group">
                        <button class="view-btn" onclick="openDetailsModal(${globalIndex})"><i class="fas fa-eye"></i> View</button>
                        <button class="cancel-btn" onclick="attemptCancel(${globalIndex})">Cancel</button>
                    </div>
                </div>
            </div>
        `;
        }).join('');
    }

    // ==========================================
    // CANCEL LOGIC (Nagpapakita ng Warning)
    // ==========================================
    async function attemptCancel(globalIndex) {
        const item = allHistoryItems[globalIndex];

        // Check kung ang record ay may bahid na ng verification, payment, o approval
        const payStatus = (item.paymentStatus || "unpaid").toLowerCase();
        const itemStatus = (item.status || "").toLowerCase();

        // Kapag ito ay naghihintay ng verification, o hindi na 'unpaid', hindi na pwede i-cancel basta basta
        const isPaidOrProcessing = payStatus !== 'unpaid' || itemStatus.includes('verifi') || itemStatus.includes('pending') || itemStatus.includes('complet') || itemStatus.includes('approv') || itemStatus.includes('prepar');

        if (isPaidOrProcessing) {
            // ILABAS ANG WARNING BOX KUNG BAYAD NA O PENDING VERIFICATION
            document.getElementById('warning-modal-overlay').style.display = 'flex';
            return;
        }

        // Kung totoong UNPAID at walang progress, pwede i-cancel
        if (!confirm(`Sigurado ka bang gusto mong i-cancel ang ${item.category} na ito?`)) return;

        try {
            const endpoint = `${API_BASE}/${item.category === 'order' ? 'Order' : 'Reservation'}/${item.id}`;
            const res = await fetch(endpoint, { method: 'DELETE' });

            if (res.ok) {
                alert("✅ Cancelled successfully!");
                allHistoryItems.splice(globalIndex, 1);

                const activeTab = document.querySelector('.tab-btn.active').innerText;
                const filterType = activeTab.includes('Food') ? 'order' : (activeTab.includes('Reser') ? 'reservation' : 'all');

                renderHistory(filterType);
            } else {
                alert("❌ Hindi ma-cancel sa system. Baka na-process na ng admin.");
            }
        } catch (e) {
            alert("Connection error. Pakicheck kung umaandar ang server.");
        }
    }

    // ==========================================
    // MODAL LOGIC (View Complete Info)
    // ==========================================
    function openDetailsModal(globalIndex) {
        const item = allHistoryItems[globalIndex];
        const dateStr = new Date(item.date).toLocaleDateString('en-PH', { year: 'numeric', month: 'long', day: 'numeric' });

        let isRes = item.category === 'reservation';

        document.getElementById('modal-title').innerText = `${isRes ? 'Reservation' : 'Order'} #${item.id}`;

        let contentHTML = `
        <div class="info-row"><span class="info-label">Type</span><span class="info-value">${item.type}</span></div>
        <div class="info-row"><span class="info-label">Date</span><span class="info-value">${dateStr}</span></div>
        <div class="info-row"><span class="info-label">Time</span><span class="info-value">${item.time}</span></div>
        <div class="info-row"><span class="info-label">Record Status</span><span class="info-value" style="color: var(--accent-orange);">${item.status}</span></div>
        <div class="info-row"><span class="info-label">Payment Status</span><span class="info-value">${item.paymentStatus}</span></div>
    `;

        if (isRes) {
            contentHTML += `
            <div class="info-row"><span class="info-label">Guests</span><span class="info-value">${item.guests} Persons</span></div>
            <div class="info-row"><span class="info-label">Notes</span><span class="info-value">${item.extraInfo}</span></div>
            <div class="info-row" style="margin-top:20px; border-top:1px solid rgba(255,255,255,0.1); padding-top:15px;">
                <span class="info-label">Downpayment</span><span class="info-value" style="font-size:1.5rem; color:var(--accent-orange);">₱${item.price.toLocaleString()}</span>
            </div>
        `;
        } else {
            contentHTML += `
            <div class="info-row"><span class="info-label">Delivery Address</span><span class="info-value">${item.extraInfo}</span></div>
            <div class="info-row" style="margin-top:20px; border-top:1px solid rgba(255,255,255,0.1); padding-top:15px;">
                <span class="info-label">Total Amount</span><span class="info-value" style="font-size:1.5rem; color:var(--accent-orange);">₱${item.price.toLocaleString()}</span>
            </div>
        `;
        }

        document.getElementById('modal-content').innerHTML = contentHTML;
        document.getElementById('info-modal-overlay').style.display = 'flex';
    }

    // Function para magsara ng kahit anong modal
    function closeModal(modalId) {
        document.getElementById(modalId).style.display = 'none';
    }
</script>
</body>
