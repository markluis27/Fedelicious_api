<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fedelicious | Account Settings</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-green: #0d2b1f;
            --accent-orange: #ff7043;
            --card-bg: #143528;
            --text-muted: #8ca398;
            --input-bg: #0a2118;
            --nav-gradient: linear-gradient(to bottom, rgba(7, 20, 15, 0.95), transparent);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--primary-green);
            color: white;
            padding-top: 120px;
            line-height: 1.6;
        }

        /* --- NAVBAR --- */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            padding: 25px 8%;
            background: var(--nav-gradient);
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-icon img {
            width: 40px;
            height: 40px;
            background: var(--accent-orange);
            padding: 6px;
            border-radius: 50%;
        }

        .brand-name {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 1.4rem;
            color: white;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 35px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .nav-links a.active,
        .nav-links a:hover {
            color: var(--accent-orange);
            border-bottom: 2px solid var(--accent-orange);
            padding-bottom: 5px;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-icon {
            color: white;
            display: flex;
            transition: 0.3s;
            text-decoration: none;
        }

        .nav-icon:hover {
            color: var(--accent-orange);
        }

        .user-circle {
            background: var(--card-bg);
            padding: 8px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .user-circle.active {
            border-color: var(--accent-orange);
        }

        /* --- SETTINGS CARD --- */
        .settings-wrapper {
            min-height: calc(100vh - 120px);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 8%;
        }

        .settings-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 600px;
            padding: 50px 60px;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .settings-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: white;
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            color: var(--text-muted);
            transition: 0.3s;
        }

        .icon-btn:hover {
            color: var(--accent-orange);
        }

        /* --- PROFILE HERO --- */
        .profile-hero {
            text-align: center;
            margin-bottom: 40px;
        }

        .avatar-box {
            width: 120px;
            height: 120px;
            background: var(--input-bg);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .avatar-box img {
            width: 60%;
            height: 60%;
            object-fit: contain;
        }

        .user-display-name {
            font-weight: 800;
            font-size: 1.6rem;
        }

        .membership-status {
            color: var(--text-muted);
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 5px;
        }

        /* --- FORM FIELDS --- */
        .settings-form {
            margin-top: 30px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-size: 0.65rem;
            color: var(--text-muted);
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: 1.5px;
        }

        .custom-field {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 18px 25px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 0.3s;
        }

        .custom-field:focus-within {
            border-color: rgba(255, 112, 67, 0.6);
            box-shadow: 0 0 18px rgba(255, 112, 67, 0.15);
        }

        .field-icon {
            color: var(--text-muted);
            opacity: 0.6;
            font-size: 1rem;
        }

        .custom-field input,
        .custom-field textarea {
            background: none;
            border: none;
            color: white;
            font-size: 0.95rem;
            width: 100%;
            outline: none;
            flex: 1;
            font-weight: 600;
        }

        .custom-field input:disabled,
        .custom-field textarea:disabled {
            opacity: 0.5;
            cursor: default;
        }

        .textarea-field {
            align-items: flex-start;
        }

        .textarea-field textarea {
            height: 70px;
            resize: none;
        }

        /* --- FORM ACTIONS --- */
        .form-actions {
            display: flex;
            gap: 20px;
            margin-top: 40px;
        }

        .edit-btn {
            flex: 1;
            background: #112d22;
            color: white;
            border: none;
            padding: 20px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .edit-btn:hover {
            background: #163a2a;
            border-color: var(--accent-orange);
        }

        .logout-btn {
            background: rgba(255, 112, 67, 0.1);
            color: var(--accent-orange);
            width: 60px;
            height: 60px;
            border-radius: 20px;
            border: 1px solid rgba(255, 112, 67, 0.2);
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logout-btn:hover {
            background: rgba(255, 112, 67, 0.2);
            border-color: var(--accent-orange);
        }

        @media(max-width: 768px) {
            .nav-links {
                display: none;
            }

            .settings-card {
                padding: 45px 30px;
            }
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="brand">
                <div class="brand-icon"><img src="images/fede.png" alt="Fedelicious Logo"></div>
                <span class="brand-name">Fedelicious</span>
            </div>

            <ul class="nav-links">
                <li><a href="landing.html">HOME</a></li>
                <li><a href="menu.html">MENU</a></li>
                <li><a href="reservation.html">RESERVATION</a></li>
                <li><a href="orders.html">ORDERS</a></li>
            </ul>

            <div class="nav-actions">
                <a href="cart.html" class="nav-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z" />
                        <line x1="3" y1="6" x2="21" y2="6" />
                        <path d="M16 10a4 4 0 0 1-8 0" />
                    </svg>
                </a>

                <div class="user-circle active">
                    <a href="profile.html" class="nav-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
                            <circle cx="12" cy="7" r="4" />
                        </svg>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="settings-wrapper">
        <div class="settings-card">

            <header class="settings-header">
                <h1 class="settings-title">ACCOUNT SETTINGS</h1>
                <button class="icon-btn settings-gear">⚙️</button>
            </header>

            <div class="profile-hero">
                <div class="avatar-box">
                    <img src="avatar.png" alt="User Avatar" id="display-avatar">
                </div>
                <h2 id="display-name" class="user-display-name">John Doe</h2>
                <p class="membership-status">SUKI MEMBER SINCE <span id="display-member-year">2026</span></p>
            </div>

            <form id="profile-form" class="settings-form">

                <div class="input-group">
                    <label>BUONG PANGALAN</label>
                    <div class="custom-field">
                        <span class="field-icon">👤</span>
                        <input type="text" id="edit-full-name" disabled>
                    </div>
                </div>

                <div class="input-group">
                    <label>GMAIL / EMAIL</label>
                    <div class="custom-field">
                        <span class="field-icon">✉️</span>
                        <input type="email" id="edit-email" disabled>
                    </div>
                </div>

                <div class="input-group">
                    <label>DELIVERY ADDRESS</label>
                    <div class="custom-field textarea-field">
                        <span class="field-icon">📍</span>
                        <textarea id="edit-address" disabled></textarea>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" class="edit-btn" id="edit-btn" onclick="toggleEdit()">
                        <i class="fa-solid fa-pencil"></i> I-EDIT PROFILE
                    </button>

                    <button type="button" class="logout-btn" id="logout-btn" onclick="logout()">
                        <i class="fa-solid fa-arrow-right-from-bracket"></i>
                    </button>
                </div>
            </form>

        </div>
    </main>

    <script>
        let isEditing = false;

        document.addEventListener('DOMContentLoaded', () => {
            const fullName = localStorage.getItem("fullName") || "Guest User";
            const email = localStorage.getItem("email") || "Walang nakalagay na email";
            const address = localStorage.getItem("address") || "Walang nakalagay na address";

            document.getElementById('display-name').innerText = fullName;

            document.getElementById('edit-full-name').value = fullName !== "Guest User" ? fullName : "";
            document.getElementById('edit-email').value = email !== "Walang nakalagay na email" ? email : "";
            document.getElementById('edit-address').value = address !== "Walang nakalagay na address" ? address : "";
        });

        function toggleEdit() {
            const nameInput = document.getElementById('edit-full-name');
            const emailInput = document.getElementById('edit-email');
            const addressInput = document.getElementById('edit-address');

            const editBtn = document.getElementById('edit-btn');

            isEditing = !isEditing;

            if (isEditing) {
                nameInput.disabled = false;
                emailInput.disabled = false;
                addressInput.disabled = false;

                nameInput.focus();

                editBtn.innerHTML = '<i class="fa-solid fa-save"></i> I-SAVE PROFILE';
                editBtn.classList.add('saving');
            } else {
                const newName = nameInput.value.trim() || "Guest User";
                const newEmail = emailInput.value.trim() || "Walang nakalagay na email";
                const newAddress = addressInput.value.trim() || "Walang nakalagay na address";

                document.getElementById('display-name').innerText = newName;

                nameInput.disabled = true;
                emailInput.disabled = true;
                addressInput.disabled = true;

                editBtn.innerHTML = '<i class="fa-solid fa-pencil"></i> I-EDIT PROFILE';
                editBtn.classList.remove('saving');

                localStorage.setItem("fullName", newName);
                localStorage.setItem("email", newEmail);
                localStorage.setItem("address", newAddress);

                alert("✅ Profile successfully updated!");
            }
        }

        function logout() {
            if (confirm("Are you sure you want to sign out?")) {
                localStorage.clear();
                window.location.href = "login.html";
            }
        }
    </script>

</body>

</html>
