<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fedelicious Admin | Order Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-light: #f4f7f6; 
            --sidebar-dark: #09261c;
            --accent-orange: #ea5b0c;
            --status-green: #4caf50;
            --status-blue: #3498db;
            --status-purple: #9b59b6;
            --white: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-light); display: flex; height: 100vh; overflow: hidden; }

        .sidebar { width: 260px; background-color: var(--sidebar-dark); color: white; padding: 30px 20px; position: fixed; height: 100vh; z-index: 100; }
        .sidebar h2 { color: #66bb6a; font-size: 1.4rem; margin-bottom: 40px; font-weight: 800; letter-spacing: 1px; }
        .sidebar a { display: flex; align-items: center; gap: 15px; color: #a3b8b0; text-decoration: none; padding: 15px; border-radius: 12px; margin-bottom: 10px; transition: 0.3s; font-size: 0.85rem; font-weight: 600; }
        .sidebar a:hover, .sidebar a.active { background: #66bb6a; color: white; }

        .main { margin-left: 260px; padding: 30px 50px; width: calc(100% - 260px); overflow-y: auto; height: 100vh; }

        .header-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .filter-tabs { display: flex; background: var(--white); padding: 5px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); gap: 5px; }
        .tab-btn { padding: 10px 18px; border-radius: 12px; border: none; background: transparent; cursor: pointer; font-weight: 600; font-size: 0.8rem; color: var(--text-muted); transition: 0.3s; }
        .tab-btn.active { background: var(--sidebar-dark); color: var(--white); }
        .tab-btn span { background: var(--accent-orange); color: var(--white); padding: 2px 7px; border-radius: 6px; font-size: 0.7rem; margin-left: 6px; }

        .stats-row { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--white); padding: 25px; border-radius: 20px; flex: 1; display: flex; flex-direction: column; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border-bottom: 4px solid #eee; }
        .stat-card h3 { font-size: 1.8rem; color: var(--text-main); font-weight: 800; }
        .stat-card p { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: 700; margin-top: 5px; }

        .order-container { display: flex; flex-direction: column; gap: 15px; padding-bottom: 50px; }
        .order-card { 
            background: var(--white); padding: 25px; border-radius: 25px; 
            display: grid; grid-template-columns: 60px 1fr auto auto;
            align-items: center; gap: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.02);
            transition: 0.3s;
        }

        .avatar-box { width: 55px; height: 55px; background: #edf2f0; border-radius: 15px; display: flex; align-items: center; justify-content: center; color: var(--sidebar-dark); font-size: 1.3rem; }
        .info-content h4 { font-size: 1.05rem; color: var(--text-main); font-weight: 700; text-transform: uppercase; margin-bottom: 5px; }
        
        .details-grid { display: grid; grid-template-columns: repeat(6, auto); gap: 25px; padding-top: 15px; border-top: 1px dashed #eee; width: fit-content; }
        .detail-item { display: flex; flex-direction: column; gap: 3px; }
        .detail-item small { font-size: 0.65rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase; }
        .detail-item span { font-size: 0.85rem; font-weight: 600; color: var(--text-main); }
        .ref-code { color: var(--accent-orange) !important; font-family: monospace; font-size: 0.9rem !important; }

        .status-badge { color: var(--white); padding: 6px 15px; border-radius: 10px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; min-width: 100px; text-align: center; }
        .action-btns { display: flex; gap: 10px; align-items: center; }
        .manage-box select { padding: 10px; border-radius: 10px; border: 1px solid #ddd; background: #f9f9f9; font-size: 0.8rem; cursor: pointer; }
        .btn-delete { width: 40px; height: 40px; border-radius: 10px; border: none; background: #fff1f0; color: #e74c3c; cursor: pointer; transition: 0.3s; }
        .btn-delete:hover { background: #e74c3c; color: white; }
        .btn-delete:disabled { background: #f0f0f0; color: #ccc; cursor: not-allowed; }

        .main::-webkit-scrollbar { width: 6px; }
        .main::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
    </style>
</head>
<body>

<aside class="sidebar">
    <h2>FEDELICIOUS</h2>
    <a href="admin.html"><i class="fas fa-th-large"></i> DASHBOARD</a>
    <a href="order_admin.html" class="active"><i class="fas fa-shopping-cart"></i> ORDERS</a>
    <a href="reservation_admin.html"><i class="fas fa-calendar-alt"></i> RESERVATIONS</a>
    <a href="menusetting.html"><i class="fas fa-utensils"></i> MENU SETTINGS</a>
    <a href="salesreport.html"><i class="fas fa-chart-line"></i> SALES REPORT</a>
    <a href="customeractivity.html" class="nav-link"><i class="fa fa-user"></i> CUSTOMER ACTIVITY</a>
    <a href="admin_management.html" class="nav-link" id="superAdminLink"><i class="fas fa-user-shield"></i> SYSTEM ADMINS</a>
    <a href="#" style="margin-top: auto; color: #e74c3c;" onclick="logout()"><i class="fas fa-sign-out-alt"></i> SIGN OUT</a>
</aside>

<main class="main">
    <div class="header-section">
        <div>
            <h2 style="font-weight: 800;">ORDERS INTELLIGENCE</h2>
            <p style="font-size: 0.85rem; color: var(--text-muted);">Confirm orders and notify customers via automation</p>
        </div>
        
        <div class="filter-tabs">
            <button class="tab-btn active" id="tab-all" onclick="filterOrders('all')">All Orders</button>
            <button class="tab-btn" id="tab-confirmed" onclick="filterOrders('confirmed')">Confirmed</button>
            <button class="tab-btn" id="tab-Pending" onclick="filterOrders('Pending')">Pending <span id="pending-badge">0</span></button>
        </div>
    </div>

    <div class="stats-row">
        <div class="stat-card" style="border-color: var(--sidebar-dark);"><h3 id="stat-total">0</h3><p>Total Orders</p></div>
        <div class="stat-card" style="border-color: var(--status-green);"><h3 id="stat-confirmed">0</h3><p>Confirmed / Ready</p></div>
        <div class="stat-card" style="border-color: var(--accent-orange);"><h3 id="stat-pending">0</h3><p>Waiting Action</p></div>
    </div>

    <div id="order-list" class="order-container">
        <p style="text-align:center; color: var(--text-muted); padding: 50px;">Fetching orders...</p>
    </div>
</main>

<script>
    const API_SP = "https://localhost:7201/api/Sp/orders";
    const API_ORDER = "https://localhost:7201/api/Order";
    
    let allOrders = [];
    let currentFilter = 'all';

    async function loadOrders() {
        try {
            const resp = await fetch(API_SP);
            if (!resp.ok) throw new Error("Failed to connect to API");

            const result = await resp.json();
            allOrders = Array.isArray(result) ? result : (result.data || result.orders || []);
            
            updateUI();
        } catch (e) {
            console.error("API Error fetching orders:", e);
            document.getElementById('order-list').innerHTML = `
                <div style="text-align:center; padding: 40px; color: red;">
                    Failed to fetch data. Paki-check ang console o API Server mo.
                </div>`;
        }
    }

    function updateUI() {
        // Group 'Pending' and 'Waiting for Verification' together
        const pending = allOrders.filter(o => 
            o.order_status === 'Pending' || o.order_status === 'Waiting for Verification'
        ).length;

        // Group active statuses together
        const confirmed = allOrders.filter(o => 
            o.order_status === 'Ready' || o.order_status === 'Delivered' || o.order_status === 'Confirmed' || o.order_status === 'Preparing'
        ).length;

        document.getElementById('stat-total').innerText = allOrders.length;
        document.getElementById('stat-confirmed').innerText = confirmed;
        document.getElementById('stat-pending').innerText = pending;
        document.getElementById('pending-badge').innerText = pending;

        filterOrders(currentFilter);
    }

    function filterOrders(status) {
        currentFilter = status;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + status).classList.add('active');

        let filtered = allOrders;
        if (status === 'confirmed') {
            filtered = allOrders.filter(o => 
                o.order_status === 'Ready' || o.order_status === 'Delivered' || o.order_status === 'Confirmed' || o.order_status === 'Preparing'
            );
        } else if (status === 'Pending') {
            filtered = allOrders.filter(o => 
                o.order_status === 'Pending' || o.order_status === 'Waiting for Verification'
            );
        }
        
        renderCards(filtered);
    }

    function renderCards(data) {
        const list = document.getElementById('order-list');

        if (!data || data.length === 0) {
            list.innerHTML = `<div style="text-align:center; padding: 50px; color: var(--text-muted);">No orders found.</div>`;
            return;
        }

        list.innerHTML = data.map(o => {
            // Mapping Exact JSON format from your API
            const orderId = o.order_id;
            const orderStatus = o.order_status || 'Pending';
            const orderDate = o.order_date;
            const customerName = o.customerName || 'GUEST CUSTOMER';
            const refNum = o.reference_number || 'N/A';
            const orderType = o.order_type || 'N/A';
            const deliveryLoc = o.delivery_location || 'Store';
            const paymentMethod = o.payment_method || 'N/A';
            const qrName = o.qr_name || 'N/A';
            const qrAccName = o.qr_accname || 'N/A';

            // Handle Null Amounts to avoid NaN errors
            const totalAmt = o.total_amount ? parseFloat(o.total_amount).toLocaleString() : '0';

            // Determine badge colors
            let color = "#95a5a6";
            if (orderStatus === 'Pending' || orderStatus === 'Waiting for Verification') color = "#f39c12"; // Orange
            if (orderStatus === 'Confirmed') color = "#16a085"; // Green
            if (orderStatus === 'Preparing') color = "#3498db"; // Blue
            if (orderStatus === 'Ready') color = "#9b59b6"; // Purple
            if (orderStatus === 'Delivered') color = "#2ecc71"; // Light Green
            if (orderStatus === 'Cancelled') color = "#e74c3c"; // Red

            // Format Date
            const date = new Date(orderDate);
            const formattedDate = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            const formattedTime = date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

            const hasPayment = o.payment_method && o.payment_method !== null && o.payment_method.trim() !== '';

            const cancelOption = !hasPayment
                ? `<option value="Cancelled">❌ Cancel Order</option>`
                : `<option value="" disabled>❌ Cancel (Disabled - Paid)</option>`;

            const deleteBtn = !hasPayment
                ? `<button class="btn-delete" onclick="deleteOrder(${orderId})" title="Delete Order"><i class="fas fa-trash-alt"></i></button>`
                : `<button class="btn-delete" disabled title="Cannot delete paid orders"><i class="fas fa-ban"></i></button>`;

            return `
                <div class="order-card">
                    <div class="avatar-box"><i class="fas fa-receipt"></i></div>
                    <div class="info-content">
                        <h4>${customerName}</h4>
                        <div style="display:flex; gap:15px; font-size:0.8rem; color:var(--text-muted); margin-bottom:10px;">
                            <span><i class="far fa-calendar-alt"></i> ${formattedDate}</span>
                            <span><i class="far fa-clock"></i> ${formattedTime}</span>
                        </div>
                        <div class="details-grid">
                            <div class="detail-item">
                                <small>Ref Number</small>
                                <span class="ref-code">${refNum}</span>
                            </div>

                            <div class="detail-item">
                                <small>Phone Number</small>
                                <span>N/A</span> </div>

                            <div class="detail-item">
                                <small>Total Bill</small>
                                <span class="amount-text" style="color:#27ae60;">₱${totalAmt}</span>
                            </div>

                            <div class="detail-item">
                                <small>Type / Location</small>
                                <span>${orderType} (${deliveryLoc})</span>
                            </div>

                            <div class="detail-item">
                                <small>QR Used</small>
                                <span>${qrName}</span>
                            </div>

                            <div class="detail-item">
                                <small>QR Account Name</small>
                                <span>${qrAccName}</span>
                            </div>
                        </div>
                    </div>
                    <div class="status-container">
                        <div class="status-badge" style="background: ${color}">${orderStatus}</div>
                        <div style="font-size:0.75rem; font-weight:700; color:var(--text-muted); text-transform:uppercase; margin-top:5px; text-align:center;">
                            ${hasPayment ? paymentMethod : 'No Payment Yet'}
                        </div>
                    </div>
                    <div class="action-btns">
                        <div class="manage-box">
                            <select onchange="updateStatus(${orderId}, this.value)">
                                <option value="">-- Manage Status --</option>
                                <option value="Confirmed">✅ Confirm Order</option>
                                <option value="Preparing">🍳 Start Preparing</option>
                                <option value="Ready">🔔 Ready to Pick-up/Serve</option>
                                <option value="Delivered">🛵 Delivered</option>
                                ${cancelOption}
                            </select>
                        </div>
                        ${deleteBtn}
                    </div>
                </div>`;
        }).join('');
    }

    async function updateStatus(id, status) {
        if (!status) return;
        if (!confirm(`Update Order #${id} to ${status} and send email notification?`)) {
            loadOrders();
            return;
        }

        const payload = {
            Status: status,
            AdminId: 1
        };

        try {
            const resp = await fetch(`${API_ORDER}/${id}/status`, {
                method: 'PUT',
                headers: {
                    'accept': '*/*',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            if (resp.ok) {
                alert(`Order successfully updated to ${status}! Email sent.`);
                loadOrders();
            } else {
                alert("Failed to update status. Please check your API/Email settings.");
            }
        } catch (err) {
            console.error("Fetch error:", err);
        }
    }

    async function deleteOrder(id) {
        if (!confirm("Are you sure you want to completely delete this order record? This cannot be undone.")) return;

        try {
            const res = await fetch(`${API_ORDER}/${id}`, { method: 'DELETE' });
            if (res.ok) {
                alert("Order deleted.");
                loadOrders();
            } else {
                alert("Failed to delete order.");
            }
        } catch (e) {
            console.error("Delete Error", e);
        }
    }

    function logout() {
        localStorage.clear();
        window.location.href = "login.html";
    }

    loadOrders();
    setInterval(loadOrders, 15000);

    document.addEventListener('DOMContentLoaded', () => {
        const role = localStorage.getItem("role");
        const superAdminLink = document.getElementById("superAdminLink");
        
        if (role) {
            if (role.trim().toLowerCase() !== "super admin" && superAdminLink) {
                superAdminLink.style.display = "none";
            }
        }
    });
</script>
</body>
</html>
