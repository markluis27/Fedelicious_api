<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fedelicious | Your Bag</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@300;400;600;800&display=swap"
        rel="stylesheet">


</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="brand">
                <div class="brand-icon">
                    <img src="images/fede.png" alt="Fedelicious Logo">
                </div>
                <span class="brand-name">Fedelicious</span>
            </div>

            <ul class="nav-links">
                <li><a href="landing.html">HOME</a></li>
                <li><a href="menu.html">MENU</a></li>
                <li><a href="reservation.html">RESERVATION</a></li>
                <li><a href="orders.html">ORDERS</a></li>
            </ul>

            <div class="nav-actions">
                <a href="cart.html" class="nav-icon active">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z" />
                        <line x1="3" y1="6" x2="21" y2="6" />
                        <path d="M16 10a4 4 0 0 1-8 0" />
                    </svg>
                </a>

                <div class="user-circle">
                    <a href="profile.html" class="nav-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
                            <circle cx="12" cy="7" r="4" />
                        </svg>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- MAIN -->
    <main class="cart-wrapper">

        <header class="cart-header">
            <h1 class="bag-title">YOUR BAG</h1>
            <p class="bag-subtitle">SELECTED DELICACIES</p>
        </header>

        <!-- CART ITEMS -->
        <div class="cart-list" id="cart-items-container"></div>

        <!-- EMPTY CART -->
        <div id="empty-cart" class="empty-msg" style="display:none;">
            <p>Your basket is empty. Those wings aren't going to order themselves!</p>
        </div>

        <!-- CHECKOUT PANEL -->
        <section class="checkout-card" id="checkout-card">

            <div class="checkout-header">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                </svg>
                FINALIZING ORDER
            </div>

            <div class="order-type-toggle">
                <button class="type-btn active" data-type="Dine-in">DINE-IN</button>
                <button class="type-btn" data-type="Take-out">TAKE-OUT</button>
                <button class="type-btn" data-type="Delivery">DELIVERY</button>
            </div>

            <div class="datetime-grid">
                <div class="checkout-input">
                    <label>Preferred Date</label>
                    <input type="date" id="order-date">
                </div>

                <div class="checkout-input">
                    <label>Preferred Time</label>
                    <input type="time" id="order-time">
                </div>
            </div>

            <label class="payment-title">Select Payment Amount</label>

            <div class="payment-grid">
                <div class="pay-option selected" id="pay-initial" data-mode="initial">
                    <span class="pay-label">Initial (50%)</span>
                    <span class="pay-val" id="display-initial">₱0</span>
                </div>

                <div class="pay-option" id="pay-full" data-mode="full">
                    <span class="pay-label">Full Payment</span>
                    <span class="pay-val" id="display-full">₱0</span>
                </div>
            </div>

            <div class="subtotal-row">
                <span>Subtotal</span>
                <span id="display-subtotal">₱0</span>
            </div>

            <div class="total-row">
                <span class="total-label">TOTAL</span>
                <span class="total-price" id="display-total">₱0</span>
            </div>

            <button class="checkout-btn" onclick="proceedToCheckout()">
                PROCEED TO CHECKOUT
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10" />
                    <path d="m9 12 2 2 4-4" />
                </svg>
            </button>

        </section>

    </main>

    <style>
        :root {
            --primary-green: #0d2b1f;
            --accent-orange: #ff7043;
            --card-bg: #143528;
            --text-muted: #8ca398;
            --input-bg: #0a2118;
            --nav-gradient: linear-gradient(to bottom, rgba(7, 20, 15, 0.95), transparent);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--primary-green);
            color: white;
            padding-top: 120px;
            line-height: 1.6;
        }

        /* NAVBAR */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            padding: 25px 8%;
            background: var(--nav-gradient);
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-icon img {
            width: 40px;
            height: 40px;
            background: var(--accent-orange);
            padding: 6px;
            border-radius: 50%;
        }

        .brand-name {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 1.4rem;
            color: white;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 35px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .nav-links a.active,
        .nav-links a:hover {
            color: var(--accent-orange);
            border-bottom: 2px solid var(--accent-orange);
            padding-bottom: 5px;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-icon {
            color: white;
            display: flex;
            transition: 0.3s;
            text-decoration: none;
        }

        .nav-icon.active,
        .nav-icon:hover {
            color: var(--accent-orange);
        }

        .user-circle {
            background: var(--card-bg);
            padding: 8px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* MAIN WRAPPER */
        .cart-wrapper {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 8%;
        }

        .bag-title {
            font-family: 'Playfair Display', serif;
            font-size: 4.5rem;
            line-height: 1;
        }

        .bag-subtitle {
            color: var(--accent-orange);
            font-weight: 800;
            font-size: 0.8rem;
            letter-spacing: 3px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        /* CART ITEM CARDS */
        .cart-item-card {
            background: var(--card-bg);
            border-radius: 30px;
            padding: 22px 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 15px;
            transition: 0.3s ease;
        }

        .item-info {
            flex: 1;
        }

        .item-info h3 {
            font-size: 1.05rem;
            font-weight: 700;
        }

        .item-price {
            color: var(--accent-orange);
            font-weight: 900;
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            display: block;
            margin-top: 5px;
        }

        .item-subtotal {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
            margin-top: 3px;
        }

        .quantity-selector {
            background: var(--input-bg);
            padding: 10px 16px;
            border-radius: 50px;
            display: flex;
            gap: 16px;
            align-items: center;
            font-weight: 800;
        }

        .qty-btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-weight: 900;
            font-size: 1.2rem;
            transition: 0.2s;
        }

        .qty-btn:hover {
            color: var(--accent-orange);
        }

        .delete-btn {
            background: none;
            border: none;
            color: #ff4d4d;
            cursor: pointer;
            opacity: 0.8;
            font-size: 1.2rem;
            transition: 0.2s;
        }

        .delete-btn:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        /* CHECKOUT PANEL DESIGN (EXACT LIKE IMAGE) */
        .checkout-card {
            background: #0f2f22;
            border-radius: 45px;
            padding: 45px;
            margin-top: 50px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .checkout-header {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--accent-orange);
            font-weight: 900;
            letter-spacing: 2px;
            font-size: 0.7rem;
            text-transform: uppercase;
            margin-bottom: 25px;
        }

        .checkout-header svg {
            width: 18px;
            height: 18px;
        }

        .order-type-toggle {
            background: var(--input-bg);
            padding: 10px;
            border-radius: 22px;
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .type-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 14px;
            font-size: 0.7rem;
            font-weight: 900;
            border-radius: 18px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .type-btn.active {
            background: var(--accent-orange);
            color: white;
        }

        .datetime-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .checkout-input label {
            display: block;
            font-size: 0.65rem;
            font-weight: 900;
            color: var(--text-muted);
            letter-spacing: 1px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .checkout-input input {
            width: 100%;
            background: var(--input-bg);
            border: none;
            padding: 16px 18px;
            border-radius: 16px;
            color: white;
            font-weight: 700;
            outline: none;
            font-size: 0.9rem;
        }

        /* PAYMENT SECTION */
        .payment-title {
            display: block;
            font-size: 0.65rem;
            font-weight: 900;
            color: var(--text-muted);
            letter-spacing: 1px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .payment-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
            margin-bottom: 30px;
        }

        .pay-option {
            background: var(--input-bg);
            padding: 18px;
            border-radius: 22px;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.3s;
        }

        .pay-option.selected {
            border: 1px solid var(--accent-orange);
            box-shadow: 0 0 18px rgba(255, 112, 67, 0.15);
        }

        .pay-label {
            display: block;
            font-size: 0.6rem;
            font-weight: 900;
            letter-spacing: 1px;
            color: var(--accent-orange);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .pay-val {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-size: 1.5rem;
        }

        /* SUBTOTAL */
        .subtotal-row {
            display: flex;
            justify-content: space-between;
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 30px;
            padding-top: 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* TOTAL */
        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
        }

        .total-row .total-label {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            font-style: italic;
            font-weight: 900;
        }

        .total-row .total-price {
            font-size: 2.8rem;
            font-weight: 900;
            color: var(--accent-orange);
        }

        /* BUTTON */
        .checkout-btn {
            width: 100%;
            background: var(--accent-orange);
            border: none;
            padding: 22px;
            border-radius: 60px;
            font-weight: 900;
            letter-spacing: 2px;
            color: white;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
        }

        .checkout-btn:hover {
            background: #ff8a65;
            transform: scale(1.02);
        }

        .checkout-btn svg {
            width: 18px;
            height: 18px;
        }

        /* EMPTY CART */
        .empty-msg {
            text-align: center;
            padding: 80px 20px;
            background: var(--card-bg);
            border-radius: 30px;
        }

        .empty-msg p {
            color: var(--text-muted);
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        @media (max-width: 900px) {
            .nav-links {
                display: none;
            }

            .bag-title {
                font-size: 3.2rem;
            }

            .datetime-grid {
                grid-template-columns: 1fr;
            }

            .payment-grid {
                grid-template-columns: 1fr;
            }

            .checkout-card {
                padding: 30px;
            }
        }
    </style>



    <script>
        let cart = JSON.parse(localStorage.getItem("cart")) || [];

        let orderType = "Dine-in";
        let paymentMode = "initial"; // initial or full

        // Order type toggle
        document.querySelectorAll(".type-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                document.querySelectorAll(".type-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                orderType = btn.dataset.type;
            });
        });

        // Payment toggle
        document.querySelectorAll(".pay-option").forEach(option => {
            option.addEventListener("click", () => {
                document.querySelectorAll(".pay-option").forEach(o => o.classList.remove("selected"));
                option.classList.add("selected");
                paymentMode = option.dataset.mode;
                updateTotals();
            });
        });

        function renderCart() {
            const container = document.getElementById("cart-items-container");
            const emptyMsg = document.getElementById("empty-cart");
            const checkoutCard = document.getElementById("checkout-card");

            if (cart.length === 0) {
                container.style.display = "none";
                checkoutCard.style.display = "none";
                emptyMsg.style.display = "block";
                return;
            }

            container.style.display = "block";
            checkoutCard.style.display = "block";
            emptyMsg.style.display = "none";
            container.innerHTML = "";

            cart.forEach((item, index) => {
                const subtotal = item.price * item.qty;

                container.innerHTML += `
                    <div class="cart-item-card">
                        <div class="item-info">
                            <h3>${item.name}</h3>
                            <span class="item-price">₱${item.price.toLocaleString()}</span>
                            <div class="item-subtotal">Subtotal: ₱${subtotal.toLocaleString()}</div>
                        </div>

                        <div class="quantity-selector">
                            <button class="qty-btn" onclick="updateQty(${index}, -1)">−</button>
                            <span>${item.qty}</span>
                            <button class="qty-btn" onclick="updateQty(${index}, 1)">+</button>
                        </div>

                        <button class="delete-btn" onclick="removeItem(${index})" title="Remove">🗑️</button>
                    </div>
                `;
            });

            updateTotals();
        }

        function updateTotals() {
            let total = 0;

            cart.forEach(item => {
                total += item.price * item.qty;
            });

            const initialPay = total * 0.5;

            document.getElementById("display-subtotal").innerText = `₱${total.toLocaleString()}`;
            document.getElementById("display-full").innerText = `₱${total.toLocaleString()}`;
            document.getElementById("display-initial").innerText = `₱${initialPay.toLocaleString()}`;

            if (paymentMode === "initial") {
                document.getElementById("display-total").innerText = `₱${initialPay.toLocaleString()}`;
            } else {
                document.getElementById("display-total").innerText = `₱${total.toLocaleString()}`;
            }
        }

        function updateQty(index, change) {
            cart[index].qty += change;

            if (cart[index].qty <= 0) {
                removeItem(index);
            } else {
                saveAndRender();
            }
        }

        function removeItem(index) {
            if (confirm(`Remove ${cart[index].name} from basket?`)) {
                cart.splice(index, 1);
                saveAndRender();
            }
        }

        function clearCart() {
            if (confirm("Are you sure you want to clear your entire basket?")) {
                cart = [];
                saveAndRender();
            }
        }

        function saveAndRender() {
            localStorage.setItem("cart", JSON.stringify(cart));
            renderCart();
        }

        function proceedToCheckout() {
            const customerId = localStorage.getItem("customer_id");

            if (!customerId) {
                alert("Please log in to continue checkout.");
                window.location.href = "login.html";
                return;
            }

            const date = document.getElementById("order-date").value;
            const time = document.getElementById("order-time").value;

            if (!date || !time) {
                alert("Please select your preferred date and time.");
                return;
            }

            localStorage.setItem("orderType", orderType);
            localStorage.setItem("orderDate", date);
            localStorage.setItem("orderTime", time);
            localStorage.setItem("paymentMode", paymentMode);

            window.location.href = "checkout.html";
        }

        renderCart();
    </script>

</body>

</html>
