<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fedelicious | Experience the Bold</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Poppins:wght@300;400;600&display=swap');

        :root {
            --primary-green: #053b2d;
            --accent-orange: #ff7a00;
            --input-bg: #0d4d3c;
            --text-dim: #cbd5d1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { height: 100vh; display: flex; background-color: #000; overflow: hidden; }

        /* Left Branding Section */
        .left-section { 
            flex: 1.5; 
            position: relative; 
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url("images/bg.jpg") no-repeat center center/cover; 
            display: flex; 
            align-items: flex-end; 
            padding: 60px; 
        }
        .brand-text h1 { font-family: 'Playfair Display', serif; color: white; font-size: 80px; font-style: italic; line-height: 1; }
        .brand-text p { color: var(--text-dim); font-size: 16px; max-width: 420px; margin-top: 20px; line-height: 1.6; }

        /* Right Form Section */
        .right-section { 
            flex: 1; 
            background: var(--primary-green); 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            padding: 60px; 
            box-shadow: -10px 0 30px rgba(0,0,0,0.3); 
        }
        .form-container { width: 100%; max-width: 400px; margin: 0 auto; }
        .logo-box { width: 55px; height: 55px; background: var(--accent-orange); border-radius: 12px; display: flex; justify-content: center; align-items: center; margin-bottom: 25px; }
        .logo-box img { width: 35px; }
        h2 { font-family: 'Playfair Display', serif; color: white; font-size: 38px; margin-bottom: 5px; }
        .subtitle { color: var(--text-dim); font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 35px; }

        .input-group { display: flex; flex-direction: column; gap: 12px; }
        input, textarea { width: 100%; padding: 14px; background: var(--input-bg); border: none; border-radius: 8px; color: white; font-size: 14px; outline: none; }
        textarea { resize: none; height: 80px; }
        input::placeholder, textarea::placeholder { color: #6a8e84; }

        .btn-primary { margin-top: 15px; padding: 15px; background: var(--accent-orange); color: white; border: none; border-radius: 8px; font-weight: 600; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .btn-primary:hover { background: #e66e00; transform: translateY(-2px); }

        .toggle-text { color: var(--text-dim); font-size: 13px; text-align: center; margin-top: 20px; }
        .toggle-text span { color: var(--accent-orange); font-weight: 600; cursor: pointer; }

        .error-msg { font-size: 13px; text-align: center; margin-top: 15px; min-height: 20px; transition: 0.3s; }
        .hidden { display: none; }

        @media (max-width: 1000px) { .left-section { display: none; } }
    </style>
</head>
<body>

<div class="left-section">
    <div class="brand-text">
        <h1>Fedelicious</h1>
        <p>Talisay's most sophisticated wing experience, crafted with love and tradition.</p>
    </div>
</div>

<div class="right-section">
    <div class="form-container">
        <div class="logo-box"><img src="logo.png" alt="Logo"></div>

        <div id="loginView">
            <h2>Welcome Back</h2>
            <p class="subtitle">Login to start your experience</p>
            <div class="input-group">
                <input type="text" id="loginId" placeholder="Email / Username">
                <input type="password" id="loginPass" placeholder="Password">
                <button class="btn-primary" onclick="login()">Sign In</button>
            </div>
            <p class="toggle-text">Walang account? <span onclick="toggleView()">Mag-register Now</span></p>
        </div>

        <div id="registerView" class="hidden">
            <h2>Register Now</h2>
            <p class="subtitle">Maging bahagi ng aming premium community</p>
            <div class="input-group">
                <input type="text" id="regFullName" placeholder="Full Name">
                <input type="email" id="regEmail" placeholder="Gmail Address">
                <textarea id="regAddress" placeholder="Complete Address"></textarea>
                <input type="password" id="regPass" placeholder="Password">
                <button class="btn-primary" onclick="register()">Mag-register</button>
            </div>
            <p class="toggle-text">May account na? <span onclick="toggleView()">Bumalik sa Login</span></p>
        </div>

        <div id="error" class="error-msg"></div>
    </div>
</div>

<script>
const BASE_URL = "https://localhost:7201";

// Toggle between login/register views
function toggleView() {
    document.getElementById('loginView').classList.toggle('hidden');
    document.getElementById('registerView').classList.toggle('hidden');
    document.getElementById('error').innerText = "";
}

// API helper
async function apiRequest(endpoint, body) {
    const res = await fetch(`${BASE_URL}${endpoint}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.message || data.title || "Unauthorized");
    return data;
}

// LOGIN
async function login() {
    const identifier = document.getElementById("loginId").value.trim();
    const password = document.getElementById("loginPass").value.trim();
    const errorDisplay = document.getElementById("error");

    if (!identifier || !password) {
        errorDisplay.style.color = "#ff6b6b";
        errorDisplay.innerText = "Please fill in all fields.";
        return;
    }

    errorDisplay.style.color = "white";
    errorDisplay.innerText = "Authenticating...";

    try {
        let sessionData = null;
        let finalRole = "";

        // Try Admin login first
        try {
            const adminData = await apiRequest("/api/Auth/login/admin", {
                email: identifier, // Assuming backend accepts username via this payload key too
                password: password
            });
            
            // Allow for APIs that return the data directly OR nested in a "user" object
            sessionData = adminData.user || adminData.User || adminData; 
            
            // Extract exact Admin Role (Super Admin vs Admin)
            finalRole = sessionData.role || sessionData.Role || "Admin"; 
            
        } catch (e) {
            // Fallback to Customer login if Admin fails
            const customerData = await apiRequest("/api/Auth/login/customer", {
                email: identifier,
                password: password
            });
            
            sessionData = customerData.user || customerData.User || customerData;
            finalRole = "Customer";
        }

        if (sessionData) {
            // Save info to localStorage
            localStorage.setItem("role", finalRole);
            localStorage.setItem("fullName", sessionData.full_name || sessionData.fullName || sessionData.Full_Name);
            
            // Save correct ID based on the user type
            if (finalRole === "Customer") {
                localStorage.setItem("customer_id", sessionData.customer_id || sessionData.id || sessionData.Customer_Id);
            } else {
                localStorage.setItem("adminId", sessionData.admin_id || sessionData.id || sessionData.Admin_Id);
            }

            errorDisplay.style.color = "#4ade80";
            errorDisplay.innerText = "Login Successful! Redirecting...";

            setTimeout(() => {
                // If it's an Admin or Super Admin, send to admin.html, otherwise index.html
                window.location.href = (finalRole.includes("Admin")) ? "admin.html" : "index.html";
            }, 800);
        }

    } catch (err) {
        errorDisplay.style.color = "#ff6b6b";
        errorDisplay.innerText = err.message || "Invalid credentials or account not verified.";
    }
}

// REGISTER
async function register() {
    const fullName = document.getElementById("regFullName").value.trim();
    const email = document.getElementById("regEmail").value.trim();
    const address = document.getElementById("regAddress").value.trim();
    const password = document.getElementById("regPass").value.trim();
    const errorDisplay = document.getElementById("error");

    if (!fullName || !email || !address || !password) {
        errorDisplay.style.color = "#ff6b6b";
        errorDisplay.innerText = "Please fill in all fields.";
        return;
    }

    try {
        await apiRequest("/api/Auth/register", {
            full_name: fullName,
            email: email,
            address: address,
            password: password
        });

        errorDisplay.style.color = "#4ade80";
        errorDisplay.innerText = "Registration successful! You may now log in.";
        setTimeout(() => {
            toggleView();
            document.getElementById("loginId").value = email; // Auto-fill email for convenience
        }, 2000);

    } catch (err) {
        errorDisplay.style.color = "#ff6b6b";
        errorDisplay.innerText = err.message || "Registration Failed.";
    }
}
</script>
</body>
</html>
