<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fedelicious Admin | Menu Settings</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-light: #f4f7f6; 
            --sidebar-dark: #09261c;
            --accent-orange: #ea5b0c;
            --status-green: #4caf50;
            --white: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-light); display: flex; height: 100vh; overflow: hidden; }

        .sidebar { width: 260px; background-color: var(--sidebar-dark); color: white; padding: 30px 20px; position: fixed; height: 100vh; z-index: 100; }
        .sidebar h2 { color: #66bb6a; font-size: 1.4rem; margin-bottom: 40px; font-weight: 800; }
        .sidebar a { display: flex; align-items: center; gap: 15px; color: #a3b8b0; text-decoration: none; padding: 15px; border-radius: 12px; margin-bottom: 10px; transition: 0.3s; font-size: 0.85rem; font-weight: 600; }
        .sidebar a.active { background: #66bb6a; color: white; }

        .main { margin-left: 260px; padding: 30px 50px; width: calc(100% - 260px); overflow-y: auto; height: 100vh; }

        .header-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .action-btns { display: flex; gap: 10px; }
        
        .btn-add { background: var(--sidebar-dark); color: white; padding: 12px 20px; border-radius: 12px; border: none; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .btn-cat { background: var(--accent-orange); }

        /* Category Filter Bar */
        .category-bar { display: flex; gap: 10px; margin-bottom: 30px; overflow-x: auto; padding-bottom: 10px; }
        .cat-chip { background: white; padding: 8px 18px; border-radius: 50px; font-size: 0.85rem; font-weight: 600; color: var(--text-main); cursor: pointer; border: 1px solid #eee; transition: 0.3s; white-space: nowrap; }
        .cat-chip.active { background: var(--sidebar-dark); color: white; border-color: var(--sidebar-dark); }

        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding-bottom: 40px; }
        .menu-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.3s; position: relative; }
        .menu-card:hover { transform: translateY(-5px); }
        .food-img { width: 100%; height: 180px; object-fit: cover; background: #eee; }
        
        .food-details { padding: 20px; }
        .food-details h4 { color: var(--text-main); font-size: 1.1rem; margin-bottom: 5px; text-transform: uppercase; }
        .food-desc { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 10px; height: 40px; overflow: hidden; display: -webkit-box; display: -moz-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; line-height: 1.4; }
        .food-price { color: var(--accent-orange); font-weight: 700; font-size: 1.2rem; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 30px; border-radius: 25px; width: 450px; max-height: 90vh; overflow-y: auto; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.8rem; margin-bottom: 5px; font-weight: 600; color: var(--text-main); }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-family: inherit; }
        
        .preview-box { width: 100%; height: 150px; border: 2px dashed #ddd; border-radius: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-top: 5px; background: #fafafa; }
        .preview-box img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Category List Style in Modal */
        .cat-list-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        .btn-del-small { color: #e74c3c; cursor: pointer; background: none; border: none; }

        .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; padding-top: 10px; border-top: 1px solid #f0f0f0; }
        .btn-icon { border: none; background: none; cursor: pointer; font-size: 1.1rem; transition: 0.2s; }
        .btn-edit { color: var(--status-green); }
        .btn-delete { color: #e74c3c; }
    </style>
</head>
<body>

<aside class="sidebar">
    <h2>FEDELICIOUS</h2>
    <a href="admin.html"><i class="fas fa-th-large"></i> DASHBOARD</a>
    <a href="order_admin.html"><i class="fas fa-shopping-cart"></i> ORDERS</a>
    <a href="reservation_admin.html"><i class="fas fa-calendar-alt"></i> RESERVATIONS</a>
    <a href="menusetting.html" class="active"><i class="fas fa-utensils"></i> MENU SETTINGS</a>
    <a href="salesreport.html"><i class="fas fa-chart-line"></i> SALES REPORT</a>
    <a href="customeractivity.html" class="nav-link"><i class="fa fa-user"></i> CUSTOMER ACTIVITY</a>
    <a href="admin_management.html" class="nav-link" id="superAdminLink"><i class="fas fa-user-shield"></i> SYSTEM ADMINS</a>
    <a href="#" style="margin-top: auto; color: #e74c3c;" onclick="logout()"><i class="fas fa-sign-out-alt"></i> SIGN OUT</a>
</aside>

<main class="main">
    <div class="header-section">
        <div>
            <h2>Menu Settings</h2>
            <p>Manage your food items and categories</p>
        </div>
        <div class="action-btns">
            <button class="btn-add btn-cat" onclick="openCatModal()"><i class="fas fa-edit"></i> Manage Categories</button>
            <button class="btn-add" onclick="openFoodModal()"><i class="fas fa-plus"></i> Add Food</button>
        </div>
    </div>

    <div class="category-bar" id="cat-filter-bar">
        <div class="cat-chip active" onclick="filterMenu('all', this)">All Items</div>
    </div>

    <div class="menu-grid" id="menu-display"></div>
</main>

<div class="modal" id="foodModal">
    <div class="modal-content">
        <h3 id="foodModalTitle">Add New Food</h3>
        <form id="foodForm">
            <input type="hidden" id="foodId">
            <div class="form-group">
                <label>Food Name</label>
                <input type="text" id="foodName" required>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="description" rows="3"></textarea>
            </div>
            <div class="form-group">
                <label>Price (₱)</label>
                <input type="number" step="0.01" id="price" required>
            </div>
            <div class="form-group">
                <label>Category</label>
                <select id="categoryId" required></select>
            </div>
            <div class="form-group">
                <label>Food Image</label>
                <input type="file" id="imageFile" accept="image/*" onchange="previewImage(this)">
                <div class="preview-box" id="imagePreview"><span>No Image</span></div>
            </div>
            <div style="display:flex; gap:10px; margin-top: 20px;">
                <button type="button" onclick="closeModal()" style="flex:1; padding:12px; border-radius:10px; border:none;">Cancel</button>
                <button type="submit" style="flex:1; padding:12px; border-radius:10px; border:none; background:var(--sidebar-dark); color:white; font-weight:600;">Save</button>
            </div>
        </form>
    </div>
</div>

<div class="modal" id="catModal">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
            <h3>Manage Categories</h3>
            <button class="btn-icon" onclick="addNewCategoryRow()" style="color:var(--status-green); font-size:1.5rem;"><i class="fas fa-plus-circle"></i></button>
        </div>
        
        <div id="category-list-container" style="max-height: 300px; overflow-y:auto; margin-bottom:20px; border-top:1px solid #eee;">
            </div>

        <button type="button" onclick="closeModal()" style="width:100%; padding:12px; border-radius:10px; border:1px solid #ddd; background:none;">Close</button>
    </div>
</div>

<script>
    const API_URL = "https://localhost:7201/api/Menu"; 
    let base64Image = "";
    let isEditMode = false;
    let menuItemsData = []; 
    let categoriesData = [];

    async function init() {
        await loadCategories();
        await loadMenu();
    }

    function previewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                base64Image = e.target.result;
                document.getElementById('imagePreview').innerHTML = `<img src="${base64Image}">`;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function loadMenu() {
        const container = document.getElementById('menu-display');
        try {
            const res = await fetch(API_URL);
            menuItemsData = await res.json();
            renderMenu(menuItemsData);
        } catch (e) { container.innerHTML = 'Error loading menu.'; }
    }

    function renderMenu(data) {
        const container = document.getElementById('menu-display');
        container.innerHTML = '';
        data.forEach((item, index) => {
            const imageSrc = item.image || 'https://via.placeholder.com/300x180?text=No+Image';
            container.innerHTML += `
                <div class="menu-card" data-category="${item.category_id}">
                    <img src="${imageSrc}" class="food-img">
                    <div class="food-details">
                        <h4>${item.food_name}</h4>
                        <p class="food-desc">${item.description || '...'}</p>
                        <p class="food-price">₱${parseFloat(item.price).toFixed(2)}</p>
                        <div class="card-footer">
                            <span style="font-size:0.7rem; color:#aaa;">ID: ${item.menu_id}</span>
                            <div>
                                <button onclick="prepareEdit(${index})" class="btn-icon btn-edit"><i class="fas fa-edit"></i></button>
                                <button onclick="deleteFood(${item.menu_id})" class="btn-icon btn-delete"><i class="fas fa-trash-alt"></i></button>
                            </div>
                        </div>
                    </div>
                </div>`;
        });
    }

    async function loadCategories() {
        try {
            const res = await fetch(`${API_URL}/categories`);
            categoriesData = await res.json();
            
            // Update Modal Dropdown
            document.getElementById('categoryId').innerHTML = categoriesData.map(c => `<option value="${c.category_id}">${c.category_name}</option>`).join('');
            
            // Update Filter Bar
            const filterBar = document.getElementById('cat-filter-bar');
            filterBar.innerHTML = '<div class="cat-chip active" onclick="filterMenu(\'all\', this)">All Items</div>';
            categoriesData.forEach(c => {
                filterBar.innerHTML += `<div class="cat-chip" onclick="filterMenu(${c.category_id}, this)">${c.category_name}</div>`;
            });

            // Update Category Manager List
            const listContainer = document.getElementById('category-list-container');
            listContainer.innerHTML = categoriesData.map(c => `
                <div class="cat-list-item">
                    <span>${c.category_name}</span>
                    <button class="btn-del-small" onclick="deleteCategory(${c.category_id})"><i class="fas fa-times"></i></button>
                </div>
            `).join('');

        } catch (e) { console.error(e); }
    }

    function filterMenu(catId, element) {
        document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
        element.classList.add('active');
        if(catId === 'all') {
            renderMenu(menuItemsData);
        } else {
            const filtered = menuItemsData.filter(m => m.category_id === catId);
            renderMenu(filtered);
        }
    }

    async function addNewCategoryRow() {
        const name = prompt("Enter New Category Name:");
        if(!name) return;
        await fetch(`${API_URL}/categories`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ category_name: name })
        });
        loadCategories();
    }

    async function deleteCategory(id) {
        if(!confirm("Delete this category? Menu items in this category might be affected.")) return;
        await fetch(`${API_URL}/categories/${id}`, { method: 'DELETE' });
        loadCategories();
    }

    document.getElementById('foodForm').onsubmit = async (e) => {
        e.preventDefault();
        const id = document.getElementById('foodId').value;
        const data = {
            food_name: document.getElementById('foodName').value,
            description: document.getElementById('description').value,
            price: parseFloat(document.getElementById('price').value),
            image: base64Image,
            category_id: parseInt(document.getElementById('categoryId').value)
        };
        const method = isEditMode ? 'PUT' : 'POST';
        const url = isEditMode ? `${API_URL}/${id}` : API_URL;

        const res = await fetch(url, {
            method: method,
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        if(res.ok) { closeModal(); loadMenu(); }
    };

    function prepareEdit(index) {
        const item = menuItemsData[index];
        isEditMode = true;
        document.getElementById('foodModalTitle').innerText = "Edit Food Item";
        document.getElementById('foodId').value = item.menu_id;
        document.getElementById('foodName').value = item.food_name;
        document.getElementById('description').value = item.description || "";
        document.getElementById('price').value = item.price;
        document.getElementById('categoryId').value = item.category_id;
        base64Image = item.image || "";
        document.getElementById('imagePreview').innerHTML = item.image ? `<img src="${item.image}">` : "<span>No Image</span>";
        document.getElementById('foodModal').style.display = 'flex';
    }

    async function deleteFood(id) {
        if(!confirm("Delete this food?")) return;
        await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
        loadMenu();
    }

    function openFoodModal() { 
        isEditMode = false;
        document.getElementById('foodForm').reset();
        document.getElementById('foodModalTitle').innerText = "Add New Food";
        document.getElementById('imagePreview').innerHTML = "<span>No Image</span>";
        base64Image = "";
        document.getElementById('foodModal').style.display = 'flex'; 
    }
    
    function openCatModal() { document.getElementById('catModal').style.display = 'flex'; }
    function closeModal() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
    function logout() { localStorage.clear(); window.location.href = "login.html"; }

    init();
    document.addEventListener('DOMContentLoaded', () => {
        // SECURITY UI: Hide 'System Admins' menu item if the user is a regular Admin
        const role = localStorage.getItem("role");
        const superAdminLink = document.getElementById("superAdminLink");
        
        if (role !== "Super Admin" && superAdminLink) {
            superAdminLink.style.display = "none";
        }
    });
</script>
</body>
</html>
