<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fedelicious | Account Settings</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #05110d; 
            --accent-orange: #ea5b0c; 
            --card-bg: #09261c; 
            --item-bg: #0b2e23; 
            --text-light: #fff; 
            --text-muted: #a3b8b0;
            --input-bg: #05110d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-light); overflow-x: hidden; }

        /* NAVBAR (Cohesive with other pages) */
        nav { display:flex; justify-content:space-between; align-items:center; padding:18px 60px; background: rgba(5, 17, 13, 0.9); position:sticky; top:0; backdrop-filter: blur(15px); z-index:1000; border-bottom: 1px solid rgba(255, 255, 255, 0.08); }
        .logo { font-weight:700; font-size:1.6rem; color: white; text-decoration: none; display: flex; align-items: center; }
        .logo span { background:var(--accent-orange); padding:4px 10px; border-radius:6px; margin-right:8px; }
        .nav-links { display:flex; align-items:center; gap:30px; }
        .nav-links a { color:var(--text-muted); text-decoration:none; font-size:0.85rem; font-weight:600; text-transform:uppercase; transition:0.3s ease; }
        .nav-links a.active, .nav-links a:hover { color:var(--accent-orange); }
        #user-display-section span, #user-display-section a { color:var(--accent-orange); font-size:0.9rem; font-weight: 700; cursor: pointer; text-decoration: none; }

        /* ACCOUNT CONTAINER */
        .container { 
            max-width: 600px; 
            margin: 50px auto; 
            padding: 40px; 
            background-color: var(--card-bg); 
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .header-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-style: italic;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* PROFILE AVATAR SECTION */
        .profile-card { text-align: center; margin-bottom: 40px; }
        .avatar-box {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #f39c12, var(--accent-orange));
            border-radius: 30px;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
            box-shadow: 0 10px 20px rgba(234, 91, 12, 0.2);
        }

        .user-name-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 5px; }
        .user-since { color: var(--text-muted); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }

        /* FORM GROUPS */
        .form-group { margin-bottom: 20px; }
        label { 
            display: block; 
            font-size: 0.65rem; 
            color: var(--text-muted); 
            font-weight: 700; 
            margin-bottom: 8px; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-field {
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 0 20px;
            height: 55px;
            border-radius: 15px;
            color: white;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .input-field i { color: var(--accent-orange); font-size: 1rem; width: 20px; text-align: center;}
        
        /* Edit Inputs */
        .edit-input {
            background: transparent;
            border: none;
            color: white;
            width: 100%;
            height: 100%;
            outline: none;
            font-family: inherit;
            font-size: 0.9rem;
            display: none; /* Hidden by default */
        }

        /* ACTIONS */
        .action-row { display: flex; gap: 15px; margin-top: 40px; }
        .btn-edit {
            flex: 1;
            background-color: transparent;
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 18px;
            border-radius: 15px;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-edit:hover { background-color: rgba(255,255,255,0.05); border-color: var(--accent-orange); }
        .btn-edit.saving { background-color: rgba(40, 167, 69, 0.1); border-color: #28a745; color: #28a745; }

        .btn-logout {
            width: 60px;
            background-color: rgba(231, 76, 60, 0.1);
            color: #e74c3c;
            border: 1px solid rgba(231, 76, 60, 0.2);
            border-radius: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: 0.3s;
        }
        .btn-logout:hover { background-color: #e74c3c; color: white; }

    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo"><span>F</span> Fedelicious</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="menu.html">Menu</a>
            <a href="reservation.html">Reservation</a>
            <a href="orders.html">History</a>
        </div>
        <div id="user-display-section"><a href="account.html">👤 Account</a></div>
    </nav>

    <div class="container">
        <div class="header-title">
            ACCOUNT SETTINGS
            <i class="fa-solid fa-gear" style="font-size: 1.2rem; color: var(--accent-orange);"></i>
        </div>

        <div class="profile-card">
            <div class="avatar-box">
                <i class="fa-solid fa-user"></i>
            </div>
            <h2 class="user-name-title" id="display-name">Guest User</h2>
            <p class="user-since">SUKI MEMBER SINCE 2026</p>
        </div>

        <div class="form-group">
            <label>Buong Pangalan</label>
            <div class="input-field" id="field-name">
                <i class="fa-regular fa-user"></i>
                <span id="full-name">Loading...</span>
                <input type="text" id="edit-full-name" class="edit-input">
            </div>
        </div>

        <div class="form-group">
            <label>Gmail / Email</label>
            <div class="input-field" id="field-email">
                <i class="fa-regular fa-envelope"></i>
                <span id="email-address">Loading...</span>
                <input type="email" id="edit-email" class="edit-input">
            </div>
        </div>

        <div class="form-group">
            <label>Delivery Address</label>
            <div class="input-field" id="field-address">
                <i class="fa-solid fa-location-dot"></i>
                <span id="delivery-address">Loading...</span>
                <input type="text" id="edit-address" class="edit-input" placeholder="House No, Street, Brgy, City">
            </div>
        </div>

        <div class="action-row">
            <button class="btn-edit" id="edit-btn" onclick="toggleEdit()">
                <i class="fa-solid fa-pencil"></i> I-EDIT PROFILE
            </button>
            <button class="btn-logout" onclick="logout()" title="Logout">
                <i class="fa-solid fa-arrow-right-from-bracket"></i>
            </button>
        </div>
    </div>

    <script>
        let isEditing = false;

        document.addEventListener('DOMContentLoaded', () => {
            // Kunin ang data mula sa localStorage
            const fullName = localStorage.getItem("fullName") || "Guest User";
            const email = localStorage.getItem("email") || "Walang nakalagay na email";
            const address = localStorage.getItem("address") || "Walang nakalagay na address";

            // I-display sa UI
            document.getElementById('display-name').innerText = fullName;
            document.getElementById('full-name').innerText = fullName;
            document.getElementById('email-address').innerText = email;
            document.getElementById('delivery-address').innerText = address;
        });

        function toggleEdit() {
            const nameSpan = document.getElementById('full-name');
            const emailSpan = document.getElementById('email-address');
            const addressSpan = document.getElementById('delivery-address');

            const nameInput = document.getElementById('edit-full-name');
            const emailInput = document.getElementById('edit-email');
            const addressInput = document.getElementById('edit-address');

            const editBtn = document.getElementById('edit-btn');
            
            isEditing = !isEditing;

            if (isEditing) {
                // ILIPAT SA EDIT MODE (Palabas ang textboxes)
                nameInput.value = nameSpan.innerText !== "Guest User" ? nameSpan.innerText : "";
                emailInput.value = emailSpan.innerText !== "Walang nakalagay na email" ? emailSpan.innerText : "";
                addressInput.value = addressSpan.innerText !== "Walang nakalagay na address" ? addressSpan.innerText : "";

                nameSpan.style.display = 'none';
                emailSpan.style.display = 'none';
                addressSpan.style.display = 'none';

                nameInput.style.display = 'block';
                emailInput.style.display = 'block';
                addressInput.style.display = 'block';

                nameInput.focus();

                editBtn.innerHTML = '<i class="fa-solid fa-save"></i> I-SAVE PROFILE';
                editBtn.classList.add('saving');
                
                // Add glowing border to fields
                document.querySelectorAll('.input-field').forEach(f => f.style.borderColor = "var(--accent-orange)");
            } else {
                // ILIPAT SA SAVE MODE (Itago ang textboxes)
                const newName = nameInput.value.trim() || "Guest User";
                const newEmail = emailInput.value.trim() || "Walang nakalagay na email";
                const newAddress = addressInput.value.trim() || "Walang nakalagay na address";

                nameSpan.innerText = newName;
                emailSpan.innerText = newEmail;
                addressSpan.innerText = newAddress;
                document.getElementById('display-name').innerText = newName;

                nameSpan.style.display = 'block';
                emailSpan.style.display = 'block';
                addressSpan.style.display = 'block';

                nameInput.style.display = 'none';
                emailInput.style.display = 'none';
                addressInput.style.display = 'none';

                editBtn.innerHTML = '<i class="fa-solid fa-pencil"></i> I-EDIT PROFILE';
                editBtn.classList.remove('saving');

                document.querySelectorAll('.input-field').forEach(f => f.style.borderColor = "rgba(255,255,255,0.05)");

                // I-Save sa localStorage
                localStorage.setItem("fullName", newName);
                localStorage.setItem("email", newEmail);
                localStorage.setItem("address", newAddress);

                alert("✅ Profile successfully updated!");
                
                // TODO (Backend): Dito mo ilalagay yung fetch() para i-update sa database if ever.
                // Halimbawa: fetch('api/Customer/update', { method: 'PUT', body: JSON.stringify({...}) })
            }
        }

        function logout() {
            if(confirm("Are you sure you want to sign out?")) {
                localStorage.clear();
                window.location.href = "login.html";
            }
        }
    </script>
</body>
</html>
