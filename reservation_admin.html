<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fedelicious Admin | Reservations Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-light: #f4f7f6; 
            --sidebar-dark: #09261c;
            --accent-orange: #ea5b0c;
            --status-green: #4caf50;
            --status-blue: #7986cb;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-light); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 260px; background-color: var(--sidebar-dark); color: white; padding: 30px 20px; position: fixed; height: 100vh; z-index: 100; }
        .sidebar h2 { color: #66bb6a; font-size: 1.4rem; margin-bottom: 40px; font-weight: 800; letter-spacing: 1px; }
        .sidebar a { display: flex; align-items: center; gap: 15px; color: #a3b8b0; text-decoration: none; padding: 15px; border-radius: 12px; margin-bottom: 10px; transition: 0.3s; font-size: 0.85rem; font-weight: 600; }
        .sidebar a:hover, .sidebar a.active { background: #66bb6a; color: white; }

        .main { margin-left: 260px; padding: 30px 50px; width: calc(100% - 260px); overflow-y: auto; height: 100vh; }

        /* Header & Filter Tabs */
        .header-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .filter-tabs { display: flex; background: var(--white); padding: 5px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); gap: 5px; }
        .tab-btn { padding: 10px 18px; border-radius: 12px; border: none; background: transparent; cursor: pointer; font-weight: 600; font-size: 0.8rem; color: var(--text-muted); transition: 0.3s; }
        .tab-btn.active { background: var(--sidebar-dark); color: var(--white); }
        .tab-btn span { background: var(--accent-orange); color: var(--white); padding: 2px 7px; border-radius: 6px; font-size: 0.7rem; margin-left: 6px; }

        /* Stats Section */
        .stats-row { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--white); padding: 25px; border-radius: 20px; flex: 1; display: flex; flex-direction: column; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border-bottom: 4px solid #eee; }
        .stat-card h3 { font-size: 1.8rem; color: var(--text-main); font-weight: 800; }
        .stat-card p { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: 700; margin-top: 5px; }
        .stat-total { border-color: var(--sidebar-dark); }
        .stat-confirmed { border-color: var(--status-green); }
        .stat-pending { border-color: var(--accent-orange); }

        /* Reservation Card */
        .res-container { display: flex; flex-direction: column; gap: 15px; padding-bottom: 50px; }
        .res-card { 
            background: var(--white); padding: 25px; border-radius: 25px; 
            display: grid; grid-template-columns: 60px 1fr auto auto;
            align-items: center; gap: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.02);
            transition: 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .res-card:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0,0,0,0.08); }

        .avatar-box { width: 55px; height: 55px; background: #edf2f0; border-radius: 15px; display: flex; align-items: center; justify-content: center; color: #4caf50; font-size: 1.3rem; }
        .info-content h4 { font-size: 1.05rem; color: var(--text-main); font-weight: 700; text-transform: uppercase; margin-bottom: 5px; }
        .meta-line { display: flex; gap: 20px; color: var(--text-muted); font-size: 0.85rem; margin-bottom: 15px; }
        
        /* Details Grid */
        .details-grid { display: grid; grid-template-columns: repeat(4, auto); gap: 30px; padding-top: 15px; border-top: 1px dashed #eee; width: fit-content; }
        .detail-item { display: flex; flex-direction: column; gap: 3px; }
        .detail-item small { font-size: 0.65rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .detail-item span { font-size: 0.9rem; font-weight: 600; color: var(--text-main); }
        .ref-code { color: var(--accent-orange) !important; font-family: monospace; font-size: 1rem !important; }

        .status-container { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; margin-right: 15px; }
        .status-badge { color: var(--white); padding: 6px 15px; border-radius: 10px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .table-badge { background: #e8f5e9; color: #2e7d32; padding: 6px 15px; border-radius: 10px; font-size: 0.85rem; font-weight: 800; }

        .action-btns { display: flex; gap: 10px; }
        .btn { width: 44px; height: 44px; border-radius: 12px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; transition: 0.2s; }
        .btn-confirm { background: #f0f4f2; color: #4caf50; }
        .btn-confirm:hover { background: #4caf50; color: var(--white); }
        .btn-delete { background: #fff1f0; color: #e74c3c; }
        .btn-delete:hover { background: #e74c3c; color: var(--white); }
        .confirmed-icon { color: var(--status-green); font-size: 2rem; }

        .main::-webkit-scrollbar { width: 6px; }
        .main::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
    </style>
</head>
<body>

<aside class="sidebar">
    <h2>FEDELICIOUS</h2>
    <a href="admin.html"><i class="fas fa-th-large"></i> DASHBOARD</a>
    <a href="order_admin.html"><i class="fas fa-shopping-cart"></i> ORDERS</a>
    <a href="reservation_admin.html" class="active"><i class="fas fa-calendar-alt"></i> RESERVATIONS</a>
    <a href="menusetting.html"><i class="fas fa-utensils"></i> MENU SETTINGS</a>
    <a href="salesreport.html"><i class="fas fa-chart-line"></i> SALES REPORT</a>
    <a href="customeractivity.html" class="nav-link"><i class="fa fa-user"></i> CUSTOMER ACTIVITY</a>
    <a href="admin_management.html" class="nav-link" id="superAdminLink"><i class="fas fa-user-shield"></i> SYSTEM ADMINS</a>
    <a href="#" style="margin-top: auto; color: #e74c3c;" onclick="logout()"><i class="fas fa-sign-out-alt"></i> SIGN OUT</a>
</aside>

<main class="main">
    <div class="header-section">
        <div>
            <h2 style="font-weight: 800; color: var(--sidebar-dark);">RESERVATIONS</h2>
            <p style="font-size: 0.85rem; color: var(--text-muted);"> Reservation and payment tracking</p>
        </div>
        
        <div class="filter-tabs">
            <button class="tab-btn active" id="tab-all" onclick="filterReservations('all')">All Bookings</button>
            <button class="tab-btn" id="tab-confirmed" onclick="filterReservations('confirmed')">Confirmed</button>
            <button class="tab-btn" id="tab-pending" onclick="filterReservations('pending')">Pending <span id="pending-badge">0</span></button>
        </div>
    </div>

    <div class="stats-row">
        <div class="stat-card stat-total">
            <h3 id="total-count">0</h3>
            <p>Total Reservations</p>
        </div>
        <div class="stat-card stat-confirmed">
            <h3 id="confirmed-count">0</h3>
            <p>Successful Arrivals</p>
        </div>
        <div class="stat-card stat-pending">
            <h3 id="pending-stat">0</h3>
            <p>Waiting Verification</p>
        </div>
    </div>

    <div id="res-list" class="res-container">
        </div>
</main>

<script>
    const SP_API = 'https://localhost:7201/api/Sp/reservations'; 
    const ACTION_API = 'https://localhost:7201/api/Reservation';
    
    let allReservations = [];
    let currentFilter = 'all';

    async function loadReservations() {
        const container = document.getElementById('res-list');
        try {
            const res = await fetch(SP_API);
            allReservations = await res.json();
            
            updateDashboardUI();
        } catch (e) {
            container.innerHTML = '<div style="text-align:center; padding:50px; color:red;">API Connection Error.</div>';
        }
    }

    function updateDashboardUI() {
        const pendingCount = allReservations.filter(r => r.reservation_status.toLowerCase().includes('waiting')).length;
        const confirmedCount = allReservations.filter(r => r.reservation_status === 'Confirmed').length;

        document.getElementById('total-count').innerText = allReservations.length;
        document.getElementById('confirmed-count').innerText = confirmedCount;
        document.getElementById('pending-stat').innerText = pendingCount;
        document.getElementById('pending-badge').innerText = pendingCount;

        filterReservations(currentFilter);
    }

    function filterReservations(type) {
        currentFilter = type;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + type).classList.add('active');

        let filtered = allReservations;
        if (type === 'pending') {
            filtered = allReservations.filter(r => r.reservation_status.toLowerCase().includes('waiting'));
        } else if (type === 'confirmed') {
            filtered = allReservations.filter(r => r.reservation_status === 'Confirmed');
        }
        renderCards(filtered);
    }

    function renderCards(data) {
        const container = document.getElementById('res-list');
        container.innerHTML = '';

        if(data.length === 0) {
            container.innerHTML = '<p style="text-align:center; padding:50px; color:#888;">No reservations found.</p>';
            return;
        }

        data.forEach(item => {
            const isWaiting = item.reservation_status.toLowerCase().includes('waiting');
            const statusBg = isWaiting ? 'var(--status-blue)' : 'var(--status-green)';
            
            const card = `
                <div class="res-card">
                    <div class="avatar-box"><i class="fas fa-user-circle"></i></div>
                    
                    <div class="info-content">
                        <h4>${item.full_name || 'MARK ORTIZ'}</h4>
                        <div class="meta-line">
                            <span><i class="far fa-calendar-alt"></i> ${new Date(item.reservation_date).toLocaleDateString()}</span>
                            <span><i class="far fa-clock"></i> ${item.reservation_time}</span>
                        </div>

                        <div class="details-grid">
                            <div class="detail-item">
                                <small>Ref Number</small>
                                <span class="ref-code">${item.reference_number || 'N/A'}</span>
                            </div>
                            <div class="detail-item">
                                <small>Phone Number</small>
                                <span>${item.customer_phone || 'No Phone'}</span>
                            </div>
                            <div class="detail-item">
                                <small>Amount</small>
                                <span>₱${item.payment_amount ? parseFloat(item.payment_amount).toLocaleString() : '0.00'}</span>
                            </div>
                            <div class="detail-item">
                                <small>Notes</small>
                                <span style="color: #555;">${item.notes || 'No instructions'}</span>
                            </div>
                        </div>
                    </div>

                    <div class="status-container">
                        <div class="status-badge" style="background: ${statusBg}">
                            ${item.reservation_status.toUpperCase()}
                        </div>
                        <div class="table-badge">TABLE T-0${item.reservation_id}</div>
                    </div>

                    <div class="action-btns">
                        ${isWaiting ? 
                            `<button class="btn btn-confirm" onclick="confirmReservation(${item.reservation_id})" title="Confirm"><i class="fas fa-check"></i></button>` : 
                            `<i class="fas fa-check-circle confirmed-icon" title="Verified"></i>`
                        }
                        <button class="btn btn-delete" onclick="deleteRes(${item.reservation_id})" title="Delete"><i class="fas fa-trash-alt"></i></button>
                    </div>
                </div>
            `;
            container.innerHTML += card;
        });
    }

    async function confirmReservation(id) {
        if(!confirm("Verify payment and confirm booking?")) return;
        try {
            const res = await fetch(`${ACTION_API}/confirm/${id}`, { method: 'PUT' });
            if (res.ok) loadReservations();
        } catch (err) { alert("Error updating status."); }
    }

    async function deleteRes(id) {
        if(!confirm("Delete this record permanently?")) return;
        try {
            const res = await fetch(`${ACTION_API}/${id}`, { method: 'DELETE' });
            if(res.ok) loadReservations();
        } catch (err) { alert("Error deleting record."); }
    }

    function logout() { localStorage.clear(); window.location.href = "login.html"; }

    loadReservations();
    setInterval(loadReservations, 30000); 
    document.addEventListener('DOMContentLoaded', () => {
        // SECURITY UI: Hide 'System Admins' menu item if the user is a regular Admin
        const role = localStorage.getItem("role");
        const superAdminLink = document.getElementById("superAdminLink");
        
        if (role !== "Super Admin" && superAdminLink) {
            superAdminLink.style.display = "none";
        }
    });
</script>
</body>
</html>
